<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Cricket V8</title>

<style>
body {
  margin: 0;
  text-align: center;
  font-family: Arial;
  background: linear-gradient(#87CEEB, #0a7d00);
  color: white;
}

h1 { margin: 10px; }

#ground {
  position: relative;
  height: 350px;
  overflow: hidden;
}

#pitch {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 90px;
  height: 100%;
  background: #8b4513;
}

#stumps {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 40px;
  background: white;
}

#ball {
  position: absolute;
  width: 15px;
  height: 15px;
  background: red;
  border-radius: 50%;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
}

#bat {
  position: absolute;
  bottom: 20px;
  left: 50%;
  width: 70px;
  height: 10px;
  background: yellow;
  transform: translateX(-50%);
}

button {
  margin-top: 10px;
  padding: 15px 30px;
  font-size: 18px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
}

#result {
  font-size: 20px;
  margin-top: 5px;
}
</style>
</head>

<body>

<h1>🏏 Tap Cricket V8</h1>
<div id="target"></div>
<div id="score">Score: 0</div>
<div id="balls">Balls: 6</div>
<div id="wickets">Wickets: 0</div>
<div id="result"></div>

<div id="ground">
  <div id="pitch"></div>
  <div id="stumps"></div>
  <div id="ball"></div>
  <div id="bat"></div>
</div>

<button onclick="hit()">HIT</button>

<script>
let score = 0;
let balls = 6;
let wickets = 0;
let target = Math.floor(Math.random() * 30) + 20;

document.getElementById("target").innerText = "Target: " + target;

let ballY = 0;
let speed = 3;
let moving = true;

function playSound(type) {
  let audio = new Audio();
  if (type === "hit") audio.src = "https://www.soundjay.com/button/beep-07.wav";
  if (type === "out") audio.src = "https://www.soundjay.com/button/beep-10.wav";
  audio.play();
}

function resetBall() {
  ballY = 0;
  speed = 3 + Math.random() * 3;
}

function animateBall() {
  if (!moving) return;

  ballY += speed;
  document.getElementById("ball").style.top = ballY + "px";

  if (ballY > 300) {
    // missed
    balls--;
    if (Math.random() < 0.4) {
      wickets++;
      document.getElementById("result").innerText = "❌ OUT!";
      playSound("out");
    } else {
      document.getElementById("result").innerText = "Miss!";
    }
    updateUI();
    resetBall();
  }

  if (balls <= 0 || wickets >= 3) endGame();

  requestAnimationFrame(animateBall);
}

function hit() {
  if (!moving || balls <= 0) return;

  let timing = Math.abs(ballY - 280);
  let run = 0;
  let text = "";

  if (timing < 10) {
    run = 6;
    text = "🔥 SIX!";
  } else if (timing < 25) {
    run = 4;
    text = "💥 FOUR!";
  } else if (timing < 50) {
    run = 1;
    text = "👍 Single";
  } else {
    run = 0;
    text = "Miss!";
  }

  if (run === 0 && Math.random() < 0.3) {
    wickets++;
    text = "❌ OUT!";
    playSound("out");
  } else if (run > 0) {
    playSound("hit");
  }

  score += run;
  balls--;

  document.getElementById("result").innerText = text;
  updateUI();
  resetBall();

  if (balls <= 0 || wickets >= 3) endGame();
}

function updateUI() {
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("balls").innerText = "Balls: " + balls;
  document.getElementById("wickets").innerText = "Wickets: " + wickets;
}

function endGame() {
  moving = false;
  setTimeout(() => {
    if (score >= target) {
      alert("🏆 YOU WON!\nScore: " + score);
    } else {
      alert("❌ YOU LOST!\nScore: " + score);
    }
  }, 200);
}

animateBall();
</script>

</body>
</html>
