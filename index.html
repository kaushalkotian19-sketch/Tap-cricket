<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Cricket V14</title>
<style>
body {
  margin:0;
  text-align:center;
  background:#0a7d00;
  color:white;
  font-family:Arial;
}
canvas { background:#2e7d32; }
button {
  margin:5px;
  padding:10px 20px;
}
</style>
</head>

<body>

<h3>🏏 Tap Cricket V14</h3>
<div id="score">Score: 0</div>
<div id="over">Over: 0.0</div>
<div id="wickets">Wickets: 0</div>
<div id="result"></div>

<canvas id="game" width="350" height="500"></canvas><br>

<button onclick="hit(-1)">⬅ Leg Side</button>
<button onclick="hit(1)">Off Side ➡</button>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let score = 0;
let balls = 0;
let wickets = 0;
let totalBalls = 6;

let ball = {x:175,y:50,vx:0,vy:4,hit:false};
let bowlingType = "fast";

function newBall() {
  ball = {x:175,y:50,vx:0,vy:4,hit:false};

  // AI chooses bowling type
  bowlingType = Math.random() > 0.5 ? "fast" : "spin";

  if(bowlingType==="spin"){
    ball.vx = (Math.random()-0.5)*2;
  } else {
    ball.vx = 0;
  }
}

function drawField(){
  ctx.fillStyle="#c2a679";
  ctx.fillRect(130,0,90,500);

  ctx.fillStyle="white";
  ctx.fillRect(170,420,5,30);
  ctx.fillRect(180,420,5,30);
  ctx.fillRect(190,420,5,30);
}

function drawPlayers(){
  // bowler
  ctx.fillStyle="orange";
  ctx.fillRect(160,20,30,50);

  // batsman
  ctx.fillStyle="blue";
  ctx.fillRect(160,380,30,50);

  // bat
  ctx.fillStyle="yellow";
  ctx.fillRect(140,420,70,5);
}

function drawBall(){
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,6,0,Math.PI*2);
  ctx.fillStyle="red";
  ctx.fill();
}

function updateBall(){
  ball.y += ball.vy;
  ball.x += ball.vx;

  if(ball.y > 430 && !ball.hit){
    balls++;
    setResult("Miss!");
    checkEnd();
    newBall();
  }

  if(ball.hit){
    ball.vy -= 0.3;
  }

  if(ball.y < 0){
    newBall();
  }
}

function hit(dir){
  let timing = Math.abs(ball.y - 420);

  let run = 0;

  if(timing < 10){
    run = 6;
    setResult("🔥 SIX!");
  }
  else if(timing < 25){
    run = 4;
    setResult("💥 FOUR!");
  }
  else if(timing < 50){
    run = 1;
    setResult("Single");
  }
  else{
    if(Math.random()<0.5){
      wickets++;
      setResult("❌ OUT!");
    } else {
      setResult("Dot ball");
    }
  }

  score += run;
  balls++;

  ball.hit = true;
  ball.vx = dir * (2 + Math.random()*2);
  ball.vy = -6;

  updateUI();
  checkEnd();
}

function updateUI(){
  document.getElementById("score").innerText="Score: "+score;
  document.getElementById("over").innerText="Over: "+Math.floor(balls/6)+"."+(balls%6);
  document.getElementById("wickets").innerText="Wickets: "+wickets;
}

function setResult(text){
  document.getElementById("result").innerText = text + " ("+bowlingType+")";
}

function checkEnd(){
  if(balls>=totalBalls || wickets>=3){
    setTimeout(()=>{
      alert("Game Over\nScore: "+score);
    },200);
  }
}

function loop(){
  ctx.clearRect(0,0,350,500);

  drawField();
  drawPlayers();
  drawBall();
  updateBall();

  requestAnimationFrame(loop);
}

newBall();
loop();
</script>

</body>
</html>
