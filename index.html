<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Hit Arena</title><style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

#topBar {
  display: flex;
  justify-content: space-between;
  padding: 12px 15px;
  background: #0b1a2e;
}

#menuBtn { font-size: 24px; cursor: pointer; }

#balance {
  background: #132b4a;
  padding: 6px 14px;
  border-radius: 20px;
}

#overlay {
  position: fixed;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
}

#sideMenu {
  position: fixed;
  left: -220px;
  width: 200px;
  height: 100%;
  background: #0f2238;
  padding: 20px;
  transition: 0.3s;
}

#gameBox {
  width: 300px;
  height: 40px;
  background: #1e293b;
  margin: 20px auto;
  position: relative;
  border-radius: 10px;
}

#perfect {
  position: absolute;
  height: 100%;
  background: #22c55e;
  left: 40%;
  width: 20%;
}

#hitZone {
  width: 10px;
  height: 100%;
  background: red;
  position: absolute;
  left: 0;
}

button {
  padding: 12px;
  margin: 10px;
  background: #ef4444;
  border: none;
  border-radius: 10px;
  color: white;
}
</style></head><body><div id="topBar">
  <div id="menuBtn" onclick="toggleMenu()">☰</div>
  <div id="balance">💰 500 ION</div>
</div><div id="overlay" onclick="toggleMenu()"></div><div id="sideMenu">
  <button onclick="goPage('home')">Dashboard</button>
  <button onclick="goPage('game')">Play</button>
  <button onclick="goPage('profile')">Profile</button>
</div><div id="content"></div><audio id="bgMusic" loop src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9bce08.mp3"></audio> <audio id="hitSound" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c1e92f4a2f.mp3"></audio>

<script>
let state = {
  coins: 500,
  page: "home",
  pos: 0,
  speed: 3,
  scoreP1: 0,
  scoreP2: 0,
  turn: "P1",
  combo: 0,
  multiplier: 1,
  titles: [],
  pool: 0
};

function toggleMenu() {
  let menu = document.getElementById("sideMenu");
  let overlay = document.getElementById("overlay");
  if (menu.style.left === "0px") {
    menu.style.left = "-220px";
    overlay.style.display = "none";
  } else {
    menu.style.left = "0";
    overlay.style.display = "block";
  }
}

function goPage(p) {
  state.page = p;
  toggleMenu();
  render();
}

function homePage() {
  return `<h1>Perfect Hit Arena</h1>`;
}

function gamePage() {
  return `
    <h2>${state.turn === "P1" ? "Player 1" : "Player 2"}</h2>
    <h3>P1: ${state.scoreP1} | P2: ${state.scoreP2}</h3>
    <h4>Combo: ${state.combo} | x${state.multiplier}</h4>

    <div id="gameBox">
      <div id="perfect"></div>
      <div id="hitZone"></div>
    </div>

    <button onclick="enterGame()">Enter (100 ION)</button>
    <button onclick="hit()">HIT</button>
  `;
}

function moveBar() {
  if (state.page !== "game") return;
  let bar = document.getElementById("hitZone");
  if (!bar) return;

  state.pos += state.speed;
  if (state.pos > 290 || state.pos < 0) state.speed *= -1;
  bar.style.left = state.pos + "px";
}
setInterval(moveBar, 20);

function enterGame() {
  if (state.coins >= 100) {
    state.coins -= 100;
    state.pool += 200;
    document.getElementById("bgMusic").play();
    updateBalance();
  }
}

function hit() {
  let perfectStart = 120;
  let perfectEnd = 180;

  document.getElementById("hitSound").play();

  let success = state.pos > perfectStart && state.pos < perfectEnd;

  if (success) {
    state.combo++;
    state.multiplier = 1 + Math.floor(state.combo / 3);

    let points = 10 * state.multiplier;

    if (state.turn === "P1") state.scoreP1 += points;
    else state.scoreP2 += points;

  } else {
    state.combo = 0;
    state.multiplier = 1;
  }

  // TITLE SYSTEM
  if (state.scoreP1 >= 50 || state.scoreP2 >= 50) {
    if (!state.titles.includes("Sharpshooter")) state.titles.push("Sharpshooter");
  }
  if (state.scoreP1 >= 100 || state.scoreP2 >= 100) {
    if (!state.titles.includes("Legend")) state.titles.push("Legend");
  }

  // SWITCH PLAYER
  state.turn = state.turn === "P1" ? "P2" : "P1";

  // END GAME (5 turns each approx)
  if (state.scoreP1 >= 100 || state.scoreP2 >= 100) {
    let winner = state.scoreP1 > state.scoreP2 ? "Player 1" : "Player 2";
    alert(winner + " wins " + state.pool + " ION!");
    state.coins += state.pool;
    state.pool = 0;
    state.scoreP1 = 0;
    state.scoreP2 = 0;
  }

  state.pos = 0;
  updateBalance();
  render();
}

function profilePage() {
  return `
    <h2>Profile</h2>
    <p>Coins: ${state.coins}</p>
    <p>Titles: ${state.titles.join(", ")}</p>
  `;
}

function render() {
  let html = "";
  if (state.page === "home") html = homePage();
  if (state.page === "game") html = gamePage();
  if (state.page === "profile") html = profilePage();
  document.getElementById("content").innerHTML = html;
}

function updateBalance() {
  document.getElementById("balance").innerText = "💰 " + state.coins + " ION";
}

render();
</script></body>
</html>
