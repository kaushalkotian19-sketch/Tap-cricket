<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Hit Arena</title><style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg,#0f172a,#020617);
  color: white;
  text-align: center;
}

/* SAFE AREA FIX */
#topBar {
  padding-top: env(safe-area-inset-top);
  display: flex;
  justify-content: space-between;
  padding: 14px 16px;
  background: #0b1a2e;
  position: relative;
  z-index: 1000;
}

#menuBtn {
  font-size: 26px;
  padding-left: 5px;
  cursor: pointer;
}

#balance {
  background: #132b4a;
  padding: 8px 16px;
  border-radius: 20px;
}

/* MENU */
#sideMenu {
  position: fixed;
  left: -240px;
  width: 230px;
  height: 100%;
  background: #0f2238;
  padding: 20px;
  transition: 0.3s;
  z-index: 2000;
}

#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  z-index: 1500;
}

.menuBtn {
  width: 100%;
  margin: 14px 0;
  padding: 14px;
  background: #1e293b;
  border-radius: 12px;
  border: none;
  color: white;
}

/* GAME */
#gameBox {
  width: 320px;
  height: 40px;
  background: #1e293b;
  margin: 20px auto;
  position: relative;
  border-radius: 12px;
}

#perfect {
  position: absolute;
  height: 100%;
  background: #22c55e;
  left: 40%;
  width: 20%;
}

#hitZone {
  width: 10px;
  height: 100%;
  background: red;
  position: absolute;
  left: 0;
}

/* BUTTON */
button {
  padding: 12px 18px;
  margin: 10px;
  background: linear-gradient(45deg,#ef4444,#dc2626);
  border: none;
  border-radius: 12px;
  color: white;
  min-width: 110px;
}

.bigScore { font-size: 34px; }
.combo { color: #22c55e; }
</style></head><body><div id="topBar">
  <div id="menuBtn" onclick="toggleMenu()">☰</div>
  <div id="balance">💰 500 ION</div>
</div><div id="overlay" onclick="toggleMenu()"></div><div id="sideMenu">
  <button class="menuBtn" onclick="goPage('combat')">⚔️ Combat</button>
  <button class="menuBtn" onclick="goPage('game')">🎮 Quick Play</button>
  <button class="menuBtn" onclick="goPage('leaderboard')">🏆 Leaderboard</button>
  <button class="menuBtn" onclick="goPage('settings')">⚙️ Settings</button>
</div><div id="content"></div><script>
let state = {
  coins: 500,
  page: "combat",

  pos: 0,
  speed: 3,
  difficulty: "medium",

  score: 0,
  combo: 0,
  multiplier: 1,

  entryFee: 100,
  pool: 0,
  inMatch: false,

  rooms: {},
  currentRoom: null
};

/* MENU */
function toggleMenu() {
  let m = document.getElementById("sideMenu");
  let o = document.getElementById("overlay");

  if (m.style.left === "0px") {
    m.style.left = "-240px";
    o.style.display = "none";
  } else {
    m.style.left = "0";
    o.style.display = "block";
  }
}

function goPage(p) {
  state.page = p;
  toggleMenu();
  render();
}

/* COMBAT PAGE */
function combatPage() {
  return `
    <h1>⚔️ Combat</h1>
    <button onclick="goPage('game')">⚡ Rush</button>
    <button onclick="alert('Tournament Coming Soon')">🏆 Tournament</button>
    <button onclick="alert('Live Mode Coming Soon')">🔴 Live</button>
    <button onclick="alert('History Coming Soon')">📜 History</button>
  `;
}

/* GAME */
function gamePage() {
  return `
    <div class="bigScore">Score: ${state.score}</div>
    <div class="combo">Combo: ${state.combo} (x${state.multiplier})</div>

    <p>💰 Fee: ${state.entryFee} | Pool: ${state.pool}</p>

    <div id="gameBox">
      <div id="perfect"></div>
      <div id="hitZone"></div>
    </div>

    <button onclick="createRoom()">Create</button>
    <button onclick="joinRoom()">Join</button>
    <button onclick="hit()">HIT</button>
  `;
}

/* MOVE */
function moveBar() {
  if (state.page !== "game") return;

  let bar = document.getElementById("hitZone");
  if (!bar) return;

  state.pos += state.speed;

  if (state.pos > 300 || state.pos < 0) state.speed *= -1;

  bar.style.left = state.pos + "px";
}
setInterval(moveBar, 20);

/* HIT (DIFFICULTY) */
function hit() {
  let perfectStart = 130;
  let perfectEnd = 190;

  let success = state.pos > perfectStart && state.pos < perfectEnd;

  if (success) {
    state.combo++;
    state.multiplier = 1 + Math.floor(state.combo / 2);
    state.score += 10 * state.multiplier;

    // increase difficulty
    state.speed += 0.3;
    document.getElementById("perfect").style.width = 
      Math.max(8, 20 - state.combo) + "%";

  } else {
    state.combo = 0;
    state.multiplier = 1;
    state.speed = 3;
  }

  state.pos = 0;
  render();
}

/* ROOMS FIXED */
function createRoom() {
  let id = Math.floor(Math.random()*10000);

  state.rooms[id] = true;
  state.currentRoom = id;

  alert("Room Created: " + id);
}

function joinRoom() {
  let id = prompt("Enter Room ID:");

  if (!state.rooms[id]) {
    alert("Invalid Room ❌");
    return;
  }

  state.currentRoom = id;
  alert("Joined Room: " + id);
}

/* RENDER */
function render() {
  let html = "";

  if (state.page === "combat") html = combatPage();
  if (state.page === "game") html = gamePage();

  document.getElementById("content").innerHTML = html;
}

render();
</script></body>
</html>
