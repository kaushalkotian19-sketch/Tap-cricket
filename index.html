<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Cricket V15</title>
<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b2a4a;
  color:white;
  text-align:center;
}

#scoreboard {
  padding:10px;
  background:#102f5c;
  font-size:18px;
}

canvas {
  background:#3aa655;
  display:block;
  margin:auto;
}

.controls {
  margin:10px;
}

button {
  padding:12px 20px;
  margin:5px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#ff3b3b;
  color:white;
}
</style>
</head>

<body>

<div id="scoreboard">
🏏 Score: <span id="score">0</span> |
Balls: <span id="balls">6</span> |
Wickets: <span id="wickets">0</span>
<br>
<span id="result">Tap to play!</span>
</div>

<canvas id="game" width="350" height="500"></canvas>

<div class="controls">
<button onclick="hit('left')">Leg Shot</button>
<button onclick="hit('right')">Off Shot</button>
</div>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let ballY = 0;
let ballX = 175;
let speed = 4;

let score = 0;
let balls = 6;
let wickets = 0;

let moving = true;

function drawPitch(){
  ctx.fillStyle = "#c2a679";
  ctx.fillRect(120, 0, 110, 500);
}

function drawBatsman(){
  ctx.fillStyle = "blue";
  ctx.fillRect(160, 400, 30, 60); // body
  ctx.fillStyle = "black";
  ctx.fillRect(170, 360, 10, 40); // bat
}

function drawBall(){
  ctx.beginPath();
  ctx.arc(ballX, ballY, 8, 0, Math.PI*2);
  ctx.fillStyle = "red";
  ctx.fill();
}

function update(){
  ctx.clearRect(0,0,350,500);

  drawPitch();
  drawBatsman();
  drawBall();

  if(moving){
    ballY += speed;
  }

  if(ballY > 480){
    nextBall();
  }

  requestAnimationFrame(update);
}

function hit(direction){
  if(ballY < 350 || ballY > 430) return;

  let run = 0;
  let text = "";

  if(Math.random() < 0.2){
    wickets++;
    text = "❌ OUT!";
  } else {
    if(direction === "left"){
      run = [1,2,4,6][Math.floor(Math.random()*4)];
    } else {
      run = [1,2,4][Math.floor(Math.random()*3)];
    }
    score += run;
    text = "🏏 " + run + " runs!";
  }

  document.getElementById("score").innerText = score;
  document.getElementById("wickets").innerText = wickets;
  document.getElementById("result").innerText = text;

  nextBall();
}

function nextBall(){
  balls--;
  document.getElementById("balls").innerText = balls;

  if(balls <= 0){
    alert("Game Over! Score: " + score);
    return;
  }

  ballY = 0;
  ballX = 120 + Math.random()*110;
}

update();
</script>

</body>
</html>
