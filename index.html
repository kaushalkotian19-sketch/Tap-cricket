<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Cricket V7</title>

<style>
body {
  margin: 0;
  text-align: center;
  background: #001a33;
  color: white;
  font-family: Arial;
}

h1 { margin-top: 10px; }

#ground {
  position: relative;
  width: 100%;
  height: 300px;
  background: linear-gradient(#0a7d00, #055a00);
  overflow: hidden;
}

#pitch {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 100%;
  background: #8b4513;
}

#ball {
  position: absolute;
  width: 15px;
  height: 15px;
  background: red;
  border-radius: 50%;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
}

#bat {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 10px;
  background: yellow;
}

button {
  margin-top: 20px;
  padding: 15px 30px;
  font-size: 18px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
}

#result {
  margin-top: 10px;
  font-size: 20px;
}
</style>
</head>

<body>

<h1>🏏 Tap Cricket V7</h1>
<div id="score">Score: 0</div>
<div id="balls">Balls: 6</div>
<div id="result"></div>

<div id="ground">
  <div id="pitch"></div>
  <div id="ball"></div>
  <div id="bat"></div>
</div>

<button onclick="hit()">HIT</button>

<script>
let score = 0;
let balls = 6;
let ballY = 0;
let speed = 3;
let moving = true;

function resetBall() {
  ballY = 0;
  speed = 3 + Math.random() * 3;
}

function animateBall() {
  if (!moving) return;

  ballY += speed;
  document.getElementById("ball").style.top = ballY + "px";

  if (ballY > 260) {
    // missed ball
    balls--;
    document.getElementById("balls").innerText = "Balls: " + balls;
    document.getElementById("result").innerText = "❌ Miss!";
    resetBall();
  }

  if (balls <= 0) {
    moving = false;
    setTimeout(() => {
      alert("Game Over!\nScore: " + score);
    }, 200);
    return;
  }

  requestAnimationFrame(animateBall);
}

function hit() {
  if (!moving || balls <= 0) return;

  let timing = Math.abs(ballY - 240);

  let run = 0;
  let text = "";

  if (timing < 10) {
    run = 6;
    text = "🔥 SIX!";
  } else if (timing < 25) {
    run = 4;
    text = "💥 FOUR!";
  } else if (timing < 50) {
    run = 1;
    text = "👍 Single";
  } else {
    run = 0;
    text = "❌ Miss!";
  }

  score += run;
  balls--;

  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("balls").innerText = "Balls: " + balls;
  document.getElementById("result").innerText = text;

  resetBall();
}

// start animation
animateBall();
</script>

</body>
</html>
