<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Hit</title>

<style>
body {
  margin:0;
  font-family:Arial;
  text-align:center;
  background:#0f172a;
  color:white;
}

h1 { margin-top:20px; }

#score, #timer, #highscore {
  font-size:18px;
  margin:5px;
}

#gameBox {
  width:300px;
  height:40px;
  background:#1e293b;
  margin:30px auto;
  position:relative;
  border-radius:10px;
}

.zone {
  position:absolute;
  height:100%;
}

#perfect {
  background:#22c55e;
  left:120px;
  width:60px;
}

#good {
  background:#eab308;
  left:90px;
  width:120px;
  opacity:0.6;
}

#marker {
  width:10px;
  height:100%;
  background:#ef4444;
  position:absolute;
  left:0;
}

button {
  padding:10px 20px;
  font-size:16px;
  background:#ef4444;
  border:none;
  border-radius:8px;
  color:white;
  margin:5px;
}

#result {
  margin-top:15px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>🎯 Perfect Hit</h1>

<div id="score">Score: 0</div>
<div id="highscore">High Score: 0</div>
<div id="timer">Time: 10s</div>

<div id="gameBox">
  <div id="good" class="zone"></div>
  <div id="perfect" class="zone"></div>
  <div id="marker"></div>
</div>

<button onclick="hit()">HIT</button>
<button onclick="restartGame()">Restart</button>

<div id="result">Tap at the right time!</div>

<script>
let marker = document.getElementById("marker");

let score = 0;
let combo = 0;
let timeLeft = 10;
let highScore = localStorage.getItem("highScore") || 0;

document.getElementById("highscore").innerText = "High Score: " + highScore;

let speed = 4;
let pos = 0;
let direction = 1;
let gameActive = true;

// simple sound
function playSound(freq){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  osc.frequency.value = freq;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),100);
}

// Animate
function animate(){
  if(!gameActive) return;

  pos += speed * direction;

  if(pos >= 290 || pos <= 0){
    direction *= -1;
  }

  marker.style.left = pos + "px";
  requestAnimationFrame(animate);
}

// Hit logic
function hit(){
  if(!gameActive) return;

  let resultText = "";

  if(pos >= 120 && pos <= 180){
    combo++;
    score += 10 + (combo * 2);
    resultText = "🔥 PERFECT x" + combo;
    playSound(600);
  }
  else if(pos >= 90 && pos <= 210){
    combo = 0;
    score += 5;
    resultText = "👍 GOOD!";
    playSound(400);
  }
  else{
    combo = 0;
    resultText = "❌ MISS!";
    playSound(200);
  }

  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("result").innerText = resultText;
}

// Timer
function startTimer(){
  let timer = setInterval(() => {

    if(!gameActive){
      clearInterval(timer);
      return;
    }

    timeLeft--;
    document.getElementById("timer").innerText = "Time: " + timeLeft + "s";

    if(timeLeft <= 0){
      gameActive = false;
      clearInterval(timer);

      if(score > highScore){
        localStorage.setItem("highScore", score);
        document.getElementById("highscore").innerText = "High Score: " + score;
      }

      document.getElementById("result").innerText = "🏁 GAME OVER!";
      alert("Final Score: " + score);
    }

  }, 1000);
}

// Restart
function restartGame(){
  score = 0;
  combo = 0;
  timeLeft = 10;
  gameActive = true;

  document.getElementById("score").innerText = "Score: 0";
  document.getElementById("timer").innerText = "Time: 10s";
  document.getElementById("result").innerText = "Tap at the right time!";

  animate();
  startTimer();
}

animate();
startTimer();
</script>

</body>
</html>
