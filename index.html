<script>
let marker = document.getElementById("marker");

let score = 0;
let combo = 0;
let timeLeft = 10;

let speed = 4;
let pos = 0;
let direction = 1;

let gameActive = true;

// Timer display
let timerText = document.createElement("div");
timerText.style.fontSize = "18px";
timerText.innerText = "Time: 10s";
document.body.insertBefore(timerText, document.getElementById("gameBox"));

// Animate marker
function animate(){
  if(!gameActive) return;

  pos += speed * direction;

  if(pos >= 290 || pos <= 0){
    direction *= -1;
  }

  marker.style.left = pos + "px";
  requestAnimationFrame(animate);
}

// Hit logic
function hit(){
  if(!gameActive) return;

  let resultText = "";

  if(pos >= 120 && pos <= 180){
    combo++;
    score += 10 + (combo * 2);
    resultText = "🔥 PERFECT! Combo x" + combo;
  }
  else if(pos >= 90 && pos <= 210){
    combo = 0;
    score += 5;
    resultText = "👍 GOOD!";
  }
  else{
    combo = 0;
    resultText = "❌ MISS!";
  }

  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("result").innerText = resultText;
}

// Timer countdown
function startTimer(){
  let timer = setInterval(() => {
    if(!gameActive){
      clearInterval(timer);
      return;
    }

    timeLeft--;
    timerText.innerText = "Time: " + timeLeft + "s";

    if(timeLeft <= 0){
      gameActive = false;
      clearInterval(timer);

      document.getElementById("result").innerText = "🏁 GAME OVER!";
      alert("Final Score: " + score);
    }
  }, 1000);
}

animate();
startTimer();
</script>
