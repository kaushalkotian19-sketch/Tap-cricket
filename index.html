<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Hit Arena</title>

<style>
body {
  margin:0;
  font-family:Arial;
  text-align:center;
  background:#0f172a;
  color:white;
}

h1 { margin-top:20px; }

#gameBox {
  width:300px;
  height:40px;
  background:#1e293b;
  margin:20px auto;
  position:relative;
  border-radius:10px;
}

.zone { position:absolute; height:100%; }

#perfect { background:#22c55e; width:60px; }
#good { background:#eab308; width:120px; opacity:0.5; }

#marker {
  width:10px;
  height:100%;
  background:#ef4444;
  position:absolute;
  left:0;
}

button {
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#ef4444;
  color:white;
}

#leaderboard { margin-top:20px; }
</style>
</head>

<body>

<h1>🎯 Perfect Hit Arena</h1>

<div>💰 Balance: <span id="balance">500</span> ION</div>
<div>👤 Turn: <span id="playerTurn">Player 1</span></div>
<div>Score: <span id="score">0</span></div>
<div>Time: <span id="timer">10</span>s</div>

<div id="gameBox">
  <div id="good" class="zone"></div>
  <div id="perfect" class="zone"></div>
  <div id="marker"></div>
</div>

<button onclick="startGame()">Enter (100 ION)</button>
<button onclick="hit()">HIT</button>

<div id="result"></div>

<div id="leaderboard">
<h3>🏆 Match Result</h3>
<div id="winner"></div>
</div>

<audio id="bgm" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

<script>
let marker = document.getElementById("marker");
let perfect = document.getElementById("perfect");
let good = document.getElementById("good");

let score = 0;
let timeLeft = 10;
let speed = 4;
let pos = 0;
let direction = 1;
let gameActive = false;

let zonePos = 120;

let balance = 500;

let player = 1;
let p1Score = 0;
let p2Score = 0;

// sound
function beep(freq){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  osc.frequency.value = freq;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),100);
}

// start game (entry)
function startGame(){
  if(balance < 100){
    alert("Not enough ION!");
    return;
  }

  balance -= 100;
  document.getElementById("balance").innerText = balance;

  score = 0;
  timeLeft = 10;
  gameActive = true;

  document.getElementById("result").innerText = "Game Started!";
  document.getElementById("bgm").play();

  animate();
  startTimer();
}

// animate
function animate(){
  if(!gameActive) return;

  pos += speed * direction;

  if(pos >= 290 || pos <= 0){
    direction *= -1;
  }

  marker.style.left = pos + "px";

  zonePos += 1;
  if(zonePos > 200) zonePos = 80;

  perfect.style.left = zonePos + "px";
  good.style.left = (zonePos - 30) + "px";

  requestAnimationFrame(animate);
}

// hit
function hit(){
  if(!gameActive) return;

  if(pos >= zonePos && pos <= zonePos+60){
    score += 10;
    beep(600);
  }
  else if(pos >= zonePos-30 && pos <= zonePos+90){
    score += 5;
    beep(400);
  }
  else{
    beep(200);
  }

  document.getElementById("score").innerText = score;
}

// timer
function startTimer(){
  let t = setInterval(()=>{
    if(!gameActive){
      clearInterval(t);
      return;
    }

    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if(timeLeft <= 0){
      clearInterval(t);
      endTurn();
    }

  },1000);
}

// turn system
function endTurn(){
  gameActive = false;

  if(player === 1){
    p1Score = score;
    player = 2;
    document.getElementById("playerTurn").innerText = "Player 2";
    document.getElementById("result").innerText = "Player 2 Turn!";
  } else {
    p2Score = score;
    decideWinner();
  }
}

// winner
function decideWinner(){
  let winner = "";

  if(p1Score > p2Score){
    winner = "🏆 Player 1 Wins!";
    balance += 200;
  } else if(p2Score > p1Score){
    winner = "🏆 Player 2 Wins!";
    balance += 200;
  } else {
    winner = "🤝 Draw!";
    balance += 100;
  }

  document.getElementById("winner").innerText = winner;
  document.getElementById("balance").innerText = balance;
  document.getElementById("bgm").pause();
}
</script>

</body>
</html>
