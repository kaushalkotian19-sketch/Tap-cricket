<!DOCTYPE html>
<html>
<head>
  <title>Tap Cricket Pro v3</title>
</head>

<body style="background:#0b1a2f; color:white; text-align:center; font-family:sans-serif;">

<h1>🏏 Tap Cricket Pro</h1>

<h2 id="score">Score: 0</h2>
<h3 id="balls">Balls left: 6</h3>
<h3 id="result"></h3>

<div style="position:relative; height:350px; margin-top:20px;">

  <!-- Ball -->
  <div id="ball" style="
    position:absolute;
    width:18px;
    height:18px;
    background:red;
    border-radius:50%;
    top:0px;
    left:50%;
  "></div>

  <!-- Moving Hit Zone -->
  <div id="zone" style="
    position:absolute;
    bottom:40px;
    width:80px;
    height:15px;
    background:yellow;
    left:40%;
  "></div>

  <!-- Bat -->
  <div id="bat" style="
    position:absolute;
    bottom:20px;
    left:45%;
    width:60px;
    height:10px;
    background:orange;
    transform-origin:left;
  "></div>

</div>

<button onclick="hit()" style="padding:15px; font-size:18px; margin-top:20px;">
  HIT
</button>

<script>
let score = 0;
let balls = 6;
let ballY = 0;
let ballX = 50;
let speed = 3;
let interval;
let zoneX = 40;
let zoneDir = 1;

// Move hit zone left-right
setInterval(() => {
  zoneX += zoneDir * 2;
  if (zoneX > 70 || zoneX < 10) zoneDir *= -1;
  document.getElementById("zone").style.left = zoneX + "%";
}, 30);

// Start ball
function startBall() {
  ballY = 0;
  ballX = 40 + Math.random() * 20;
  speed = 3 + Math.random() * 2;

  let ball = document.getElementById("ball");
  ball.style.top = "0px";
  ball.style.left = ballX + "%";

  interval = setInterval(() => {
    ballY += speed;
    ball.style.top = ballY + "px";

    if (ballY > 300) {
      clearInterval(interval);
      out();
    }
  }, 20);
}

function hit() {
  if (balls <= 0) return;

  clearInterval(interval);

  // Bat swing animation
  let bat = document.getElementById("bat");
  bat.style.transform = "rotate(-45deg)";
  setTimeout(() => {
    bat.style.transform = "rotate(0deg)";
  }, 200);

  let zoneLeft = zoneX;
  let zoneRight = zoneX + 10;

  let run = 0;
  let text = "";

  // Check position match
  if (ballY > 230 && ballY < 300) {
    if (ballX >= zoneLeft && ballX <= zoneRight) {
      run = 6;
      text = "🔥 PERFECT SIX!";
    } else if (Math.abs(ballX - zoneLeft) < 10) {
      run = 4;
      text = "👍 FOUR!";
    } else {
      run = 1;
      text = "🙂 EDGE";
    }
  } else {
    return out();
  }

  score += run;
  balls--;

  update(text);

  if (balls > 0) {
    setTimeout(startBall, 700);
  } else {
    endGame();
  }
}

function out() {
  balls--;
  update("❌ OUT!");

  if (balls > 0) {
    setTimeout(startBall, 700);
  } else {
    endGame();
  }
}

function update(text) {
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("balls").innerText = "Balls left: " + balls;
  document.getElementById("result").innerText = text;
}

function endGame() {
  setTimeout(() => {
    alert("🏏 Game Over!\nScore: " + score);
  }, 200);
}

// Start game
startBall();
</script>

</body>
</html>
