<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Cricket V9</title>

<style>
body {
  margin: 0;
  text-align: center;
  font-family: Arial;
  background: linear-gradient(#6ec6ff, #0a7d00);
  color: white;
}

h1 { margin: 10px; }

#ground {
  position: relative;
  height: 380px;
  overflow: hidden;
}

#pitch {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 100px;
  height: 100%;
  background: #8b4513;
}

#stumps {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 40px;
  background: white;
}

#ball {
  position: absolute;
  width: 14px;
  height: 14px;
  background: red;
  border-radius: 50%;
  top: 0;
}

#bat {
  position: absolute;
  bottom: 20px;
  left: 50%;
  width: 80px;
  height: 10px;
  background: yellow;
  transform: translateX(-50%);
  transition: transform 0.1s;
}

/* Simple batsman */
#batsman {
  position: absolute;
  bottom: 30px;
  left: 50%;
  width: 10px;
  height: 40px;
  background: white;
  transform: translateX(-50%);
}

/* Simple bowler */
#bowler {
  position: absolute;
  top: 10px;
  left: 50%;
  width: 10px;
  height: 40px;
  background: orange;
  transform: translateX(-50%);
}

button {
  margin-top: 10px;
  padding: 15px 30px;
  font-size: 18px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
}

#result {
  font-size: 20px;
  margin-top: 5px;
}
</style>
</head>

<body>

<h1>🏏 Tap Cricket V9</h1>
<div id="target"></div>
<div id="score">Score: 0</div>
<div id="over">Over: 0.0</div>
<div id="wickets">Wickets: 0</div>
<div id="result"></div>

<div id="ground">
  <div id="pitch"></div>
  <div id="bowler"></div>
  <div id="ball"></div>
  <div id="batsman"></div>
  <div id="bat"></div>
  <div id="stumps"></div>
</div>

<button onclick="hit()">HIT</button>

<script>
let score = 0;
let balls = 0;
let wickets = 0;
let totalBalls = 6;
let target = Math.floor(Math.random() * 30) + 20;

document.getElementById("target").innerText = "Target: " + target;

let ballY = 0;
let ballX = window.innerWidth / 2;
let speed = 4;
let swing = 0;
let moving = true;

function updateOver() {
  let over = Math.floor(balls / 6);
  let ball = balls % 6;
  document.getElementById("over").innerText = "Over: " + over + "." + ball;
}

function resetBall() {
  ballY = 0;
  ballX = window.innerWidth / 2;
  speed = 4 + Math.random() * 3;
  swing = (Math.random() - 0.5) * 4; // left/right swing
}

function animateBall() {
  if (!moving) return;

  ballY += speed;
  ballX += swing;

  document.getElementById("ball").style.top = ballY + "px";
  document.getElementById("ball").style.left = ballX + "px";

  if (ballY > 320) {
    bowlMiss();
  }

  requestAnimationFrame(animateBall);
}

function bowlMiss() {
  balls++;
  if (Math.random() < 0.4) {
    wickets++;
    showResult("❌ OUT!");
  } else {
    showResult("Miss!");
  }
  nextBall();
}

function hit() {
  if (!moving) return;

  let timing = Math.abs(ballY - 300);
  let run = 0;

  // bat swing animation
  document.getElementById("bat").style.transform = "translateX(-50%) rotate(-25deg)";
  setTimeout(() => {
    document.getElementById("bat").style.transform = "translateX(-50%)";
  }, 100);

  if (timing < 10) {
    run = 6;
    showResult("🔥 SIX!");
  } else if (timing < 25) {
    run = 4;
    showResult("💥 FOUR!");
  } else if (timing < 50) {
    run = 1;
    showResult("👍 Single");
  } else {
    if (Math.random() < 0.5) {
      wickets++;
      showResult("❌ OUT!");
    } else {
      showResult("Miss!");
    }
  }

  score += run;
  balls++;

  nextBall();
}

function nextBall() {
  updateUI();
  updateOver();

  if (balls >= totalBalls || wickets >= 3) {
    endGame();
    return;
  }

  resetBall();
}

function updateUI() {
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("wickets").innerText = "Wickets: " + wickets;
}

function showResult(text) {
  document.getElementById("result").innerText = text;
}

function endGame() {
  moving = false;
  setTimeout(() => {
    if (score >= target) {
      alert("🏆 YOU WON!\nScore: " + score);
    } else {
      alert("❌ YOU LOST!\nScore: " + score);
    }
  }, 200);
}

resetBall();
animateBall();
</script>

</body>
</html>
