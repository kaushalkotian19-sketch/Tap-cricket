<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Hit Arena</title><!-- Firebase --><script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script><style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#0f172a,#020617);
  color: white;
  text-align: center;
}

#topBar {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  background: #0b1a2e;
}

#balance {
  background: #132b4a;
  padding: 6px 14px;
  border-radius: 20px;
}

#gameBox {
  width: 300px;
  height: 40px;
  background: #1e293b;
  margin: 20px auto;
  position: relative;
  border-radius: 10px;
}

#perfect {
  position: absolute;
  height: 100%;
  background: #22c55e;
  left: 40%;
  width: 20%;
}

#hitZone {
  width: 10px;
  height: 100%;
  background: red;
  position: absolute;
  left: 0;
}

button {
  padding: 12px 16px;
  margin: 8px;
  background: #ef4444;
  border: none;
  border-radius: 10px;
  color: white;
}

.room {
  background: #1e293b;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
}
</style></head><body><div id="topBar">
  <div>⚔️ Combat</div>
  <div id="balance">💰 500 ION</div>
</div><div id="content"></div><script>
// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDVnSw1QHjrZ0TCHOKBDK5PxjMhPPRVehI",
  authDomain: "perfect-hit-arena.firebaseapp.com",
  databaseURL: "https://perfect-hit-arena-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "perfect-hit-arena",
  storageBucket: "perfect-hit-arena.firebasestorage.app",
  messagingSenderId: "1098567967142",
  appId: "1:1098567967142:web:1a6b3bbd3a97cea6566f67"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// STATE
let state = {
  coins: 500,
  playerId: "p" + Math.floor(Math.random()*10000),
  roomId: null,
  score: 0,
  pos: 0,
  speed: 3,
  entryFee: 100
};

// RENDER LOBBY
function renderLobby() {
  db.ref("rooms").once("value", snap => {
    let rooms = snap.val() || {};
    let html = "<h2>⚔️ Combat Rooms</h2>";

    for (let id in rooms) {
      let r = rooms[id];
      html += `
        <div class="room">
          <p>Room: ${id}</p>
          <p>Pool: ${r.pool} ION</p>
          <button onclick="joinRoom('${id}')">Join</button>
        </div>
      `;
    }

    html += `<button onclick="createRoom()">+ Create Room</button>`;

    document.getElementById("content").innerHTML = html;
  });
}

// CREATE ROOM
function createRoom() {
  if (state.coins < state.entryFee) return alert("Not enough ION");

  let id = "room_" + Math.floor(Math.random()*10000);

  db.ref("rooms/" + id).set({
    pool: state.entryFee,
    players: {
      [state.playerId]: { score: 0 }
    }
  });

  state.coins -= state.entryFee;
  state.roomId = id;

  renderGame();
}

// JOIN ROOM
function joinRoom(id) {
  db.ref("rooms/" + id).once("value", snap => {
    if (!snap.exists()) return alert("Invalid Room");

    let room = snap.val();

    if (state.coins < state.entryFee) return alert("Not enough ION");

    db.ref("rooms/" + id + "/players/" + state.playerId).set({
      score: 0
    });

    db.ref("rooms/" + id + "/pool").set(room.pool + state.entryFee);

    state.coins -= state.entryFee;
    state.roomId = id;

    renderGame();
  });
}

// GAME UI
function renderGame() {
  document.getElementById("content").innerHTML = `
    <h2>Score: ${state.score}</h2>
    <div id="gameBox">
      <div id="perfect"></div>
      <div id="hitZone"></div>
    </div>
    <button onclick="hit()">HIT</button>
  `;

  listenRoom();
}

// MOVE BAR
setInterval(() => {
  let bar = document.getElementById("hitZone");
  if (!bar) return;

  state.pos += state.speed;
  if (state.pos > 290 || state.pos < 0) state.speed *= -1;

  bar.style.left = state.pos + "px";
}, 20);

// HIT
function hit() {
  let success = state.pos > 120 && state.pos < 180;

  if (success) {
    state.score += 10;
    updateScore();
  }

  state.pos = 0;
  renderGame();
}

// UPDATE SCORE
function updateScore() {
  db.ref("rooms/" + state.roomId + "/players/" + state.playerId)
    .update({ score: state.score });
}

// LISTEN (REAL TIME)
function listenRoom() {
  db.ref("rooms/" + state.roomId).on("value", snap => {
    let data = snap.val();
    if (!data) return;

    let scores = Object.values(data.players).map(p => p.score);
    let max = Math.max(...scores);

    if (max >= 100) {
      alert("🏆 Winner gets " + data.pool + " ION!");
      state.coins += data.pool;

      db.ref("rooms/" + state.roomId).remove();

      state.roomId = null;
      state.score = 0;

      renderLobby();
    }
  });
}

// START
renderLobby();
</script></body>
</html>
