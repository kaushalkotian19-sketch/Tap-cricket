<!DOCTYPE html>
<html>
<head>
<title>Tap Cricket</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  text-align: center;
  font-family: Arial;
  background: #0f172a;
  color: white;
}
h1 { margin-top: 20px; }
#score { font-size: 30px; margin: 20px; }
#ball {
  width: 50px;
  height: 50px;
  background: red;
  border-radius: 50%;
  position: relative;
  margin: auto;
  top: 100px;
}
button {
  padding: 15px 30px;
  font-size: 18px;
  background: gold;
  border: none;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🏏 Tap Cricket</h1>
<div id="score">Score: 0</div>
<div id="balls">Balls left: 6</div>

<div id="ball"></div>

<br><br>
<button onclick="hit()">HIT!</button>

<script>
let score = 0;
let balls = 6;

function hit() {
  if (balls <= 0) return;

  let runs = Math.floor(Math.random() * 7); // 0 to 6
  score += runs;
  balls--;

  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("balls").innerText = "Balls left: " + balls;

  if (balls === 0) {
    setTimeout(() => {
      alert("Game Over! Your Score: " + score);
      score = 0;
      balls = 6;
      document.getElementById("score").innerText = "Score: 0";
      document.getElementById("balls").innerText = "Balls left: 6";
    }, 300);
  }
}
</script>

</body>
</html>
