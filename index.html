<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Hit Arena</title><style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

/* TOP BAR */
#topBar {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  background: #0b1a2e;
  z-index: 1000;
  position: relative;
}

#menuBtn { font-size: 24px; cursor: pointer; }

#balance {
  background: #132b4a;
  padding: 6px 14px;
  border-radius: 20px;
}

/* MENU */
#sideMenu {
  position: fixed;
  top: 0;
  left: -230px;
  width: 220px;
  height: 100%;
  background: #0f2238;
  padding: 20px;
  transition: 0.3s;
  z-index: 2000;
}

#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  z-index: 1500;
}

.menuBtn {
  width: 100%;
  margin: 14px 0;
  padding: 14px;
  background: #1e293b;
  border-radius: 12px;
  color: white;
  border: none;
}

/* CONTENT LOCK */
#content.menu-open {
  filter: blur(3px);
  pointer-events: none;
}

/* GAME */
#gameBox {
  width: 300px;
  height: 40px;
  background: #1e293b;
  margin: 20px auto;
  position: relative;
  border-radius: 10px;
}

#perfect {
  position: absolute;
  height: 100%;
  background: #22c55e;
  left: 40%;
  width: 20%;
}

#hitZone {
  width: 10px;
  height: 100%;
  background: red;
  position: absolute;
  left: 0;
}

/* BUTTON */
button {
  padding: 12px 18px;
  margin: 10px;
  background: linear-gradient(45deg,#ef4444,#dc2626);
  border: none;
  border-radius: 12px;
  color: white;
  min-width: 110px;
}

/* TEXT */
.bigScore { font-size: 32px; }
.combo { color: #22c55e; }
</style></head><body><div id="topBar">
  <div id="menuBtn" onclick="toggleMenu()">☰</div>
  <div id="balance">💰 500 ION</div>
</div><div id="overlay" onclick="toggleMenu()"></div><div id="sideMenu">
  <button class="menuBtn" onclick="goPage('home')">🏠 Dashboard</button>
  <button class="menuBtn" onclick="goPage('game')">🎮 Play</button>
  <button class="menuBtn" onclick="goPage('leaderboard')">🏆 Leaderboard</button>
  <button class="menuBtn" onclick="goPage('settings')">⚙️ Settings</button>
  <button class="menuBtn" onclick="goPage('profile')">👤 Profile</button>
</div><div id="content"></div><script>
let state = {
  coins: 500,
  page: "home",

  pos: 0,
  speed: 3,

  score: 0,
  combo: 0,
  multiplier: 1,

  entryFee: 100,
  pool: 0,
  inMatch: false,
  room: null,

  leaderboard: JSON.parse(localStorage.getItem("leaderboard") || "[]"),
  sound: true
};

/* MENU */
function toggleMenu() {
  let m = document.getElementById("sideMenu");
  let o = document.getElementById("overlay");
  let c = document.getElementById("content");

  if (m.style.left === "0px") {
    m.style.left = "-230px";
    o.style.display = "none";
    c.classList.remove("menu-open");
  } else {
    m.style.left = "0";
    o.style.display = "block";
    c.classList.add("menu-open");
  }
}

function goPage(p) {
  state.page = p;
  toggleMenu();
  render();
}

/* HOME */
function homePage() {
  return `<h1>🎯 Perfect Hit Arena</h1>`;
}

/* GAME */
function gamePage() {
  return `
    <div class="bigScore">Score: ${state.score}</div>
    <div class="combo">Combo: ${state.combo} (x${state.multiplier})</div>

    <p>💰 Entry Fee: ${state.entryFee} ION</p>
    <p>🏦 Pool: ${state.pool} ION</p>

    <div id="gameBox">
      <div id="perfect"></div>
      <div id="hitZone"></div>
    </div>

    <div>
      <button onclick="createRoom()">🌐 Create</button>
      <button onclick="joinRoom()">🔑 Join</button>
    </div>

    <button onclick="hit()">🎯 HIT</button>
  `;
}

/* MOVE */
function moveBar() {
  if (state.page !== "game") return;

  let bar = document.getElementById("hitZone");
  if (!bar) return;

  state.pos += state.speed;
  if (state.pos > 290 || state.pos < 0) state.speed *= -1;

  bar.style.left = state.pos + "px";
}
setInterval(moveBar, 20);

/* HIT */
function hit() {
  let success = state.pos > 120 && state.pos < 180;

  if (success) {
    state.combo++;
    state.multiplier = 1 + Math.floor(state.combo / 3);
    state.score += 10 * state.multiplier;
  } else {
    state.combo = 0;
    state.multiplier = 1;
  }

  if (state.score >= 100 && state.inMatch) {
    alert("🏆 You win " + state.pool + " ION!");
    state.coins += state.pool;
    state.pool = 0;
    state.inMatch = false;
    saveScore();
    updateBalance();
  }

  state.pos = 0;
  render();
}

/* CREATE ROOM */
function createRoom() {
  if (state.coins < state.entryFee) return alert("Not enough ION");

  state.coins -= state.entryFee;
  state.pool = state.entryFee;
  state.inMatch = true;

  let id = Math.floor(Math.random()*10000);
  state.room = id;

  updateBalance();
  alert("Room: " + id);
}

/* JOIN ROOM */
function joinRoom() {
  if (state.coins < state.entryFee) return alert("Not enough ION");

  let id = prompt("Enter Room ID:");
  if (!id) return;

  state.coins -= state.entryFee;
  state.pool += state.entryFee;
  state.inMatch = true;

  updateBalance();
  alert("Joined Room: " + id);
}

/* LEADERBOARD */
function leaderboardPage() {
  let list = state.leaderboard.map(s => `<p>🏆 ${s}</p>`).join("");
  return `<h2>Leaderboard</h2>${list}`;
}

function saveScore() {
  state.leaderboard.push(state.score);
  state.leaderboard.sort((a,b)=>b-a);
  state.leaderboard = state.leaderboard.slice(0,10);
  localStorage.setItem("leaderboard", JSON.stringify(state.leaderboard));
}

/* SETTINGS */
function settingsPage() {
  return `
    <h2>Settings</h2>
    <button onclick="toggleSound()">Sound: ${state.sound ? "ON" : "OFF"}</button>
  `;
}

function toggleSound() {
  state.sound = !state.sound;
  render();
}

/* PROFILE */
function profilePage() {
  return `<h2>Coins: ${state.coins}</h2>`;
}

/* RENDER */
function render() {
  let html = "";

  if (state.page === "home") html = homePage();
  if (state.page === "game") html = gamePage();
  if (state.page === "leaderboard") html = leaderboardPage();
  if (state.page === "settings") html = settingsPage();
  if (state.page === "profile") html = profilePage();

  document.getElementById("content").innerHTML = html;
}

/* BALANCE */
function updateBalance() {
  document.getElementById("balance").innerText = "💰 " + state.coins + " ION";
}

render();
</script></body>
</html>
