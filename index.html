<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Hit Arena</title><style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

/* TOP BAR */
#topBar {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  background: #0b1a2e;
}

#menuBtn { font-size: 24px; cursor: pointer; }

#balance {
  background: #132b4a;
  padding: 6px 14px;
  border-radius: 20px;
}

/* MENU */
#sideMenu {
  position: fixed;
  left: -220px;
  width: 220px;
  height: 100%;
  background: #0f2238;
  padding: 20px;
  transition: 0.3s;
  z-index: 1000;
}

#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  display: none;
  z-index: 999;
}

.menuBtn {
  width: 100%;
  margin: 12px 0;
  padding: 12px;
  background: #1e293b;
  border-radius: 10px;
  color: white;
  border: none;
}

/* GAME */
#gameBox {
  width: 300px;
  height: 40px;
  background: #1e293b;
  margin: 20px auto;
  position: relative;
  border-radius: 10px;
}

#perfect {
  position: absolute;
  height: 100%;
  background: #22c55e;
  left: 40%;
  width: 20%;
}

#hitZone {
  width: 10px;
  height: 100%;
  background: red;
  position: absolute;
  left: 0;
}

/* BUTTON */
button {
  padding: 12px 18px;
  margin: 12px;
  background: linear-gradient(45deg,#ef4444,#dc2626);
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 16px;
}

/* TEXT */
.bigScore { font-size: 30px; }
.combo { color: #22c55e; }
</style></head><body><div id="topBar">
  <div id="menuBtn" onclick="toggleMenu()">☰</div>
  <div id="balance">💰 500 ION</div>
</div><div id="overlay" onclick="toggleMenu()"></div><div id="sideMenu">
  <button class="menuBtn" onclick="goPage('home')">🏠 Dashboard</button>
  <button class="menuBtn" onclick="goPage('game')">🎮 Play</button>
  <button class="menuBtn" onclick="goPage('profile')">👤 Profile</button>
</div><div id="content"></div><script>
let state = {
  coins: 500,
  page: "home",

  pos: 0,
  speed: 3,

  score: 0,
  combo: 0,
  multiplier: 1,

  // PvP
  mode: "solo",
  entryFee: 100,
  pool: 0,
  p1Paid: false,
  p2Paid: false,
  currentPlayer: "P1",
  scoreP1: 0,
  scoreP2: 0,
  rounds: 0
};

/* MENU */
function toggleMenu() {
  let menu = document.getElementById("sideMenu");
  let overlay = document.getElementById("overlay");

  if (menu.style.left === "0px") {
    menu.style.left = "-220px";
    overlay.style.display = "none";
  } else {
    menu.style.left = "0";
    overlay.style.display = "block";
  }
}

function goPage(p) {
  state.page = p;
  toggleMenu();
  render();
}

/* HOME */
function homePage() {
  return `<h1>🎯 Perfect Hit Arena</h1>`;
}

/* GAME */
function gamePage() {
  return `
    ${state.mode === "pvp" ? `
      <h3>⚔️ P1: ${state.scoreP1} | P2: ${state.scoreP2}</h3>
      <p>Turn: ${state.currentPlayer}</p>
      <p>Pool: ${state.pool} ION</p>
    ` : `
      <div class="bigScore">Score: ${state.score}</div>
    `}

    <div class="combo">Combo: ${state.combo} (x${state.multiplier})</div>

    <div id="gameBox">
      <div id="perfect"></div>
      <div id="hitZone"></div>
    </div>

    <button onclick="startPvP()">⚔️ PvP Mode</button>
    <button onclick="enterGame()">💰 Enter (${state.entryFee} ION)</button>
    <button onclick="hit()">🎯 HIT</button>
  `;
}

/* MOVE */
function moveBar() {
  if (state.page !== "game") return;

  let bar = document.getElementById("hitZone");
  if (!bar) return;

  state.pos += state.speed;
  if (state.pos > 290 || state.pos < 0) state.speed *= -1;

  bar.style.left = state.pos + "px";
}
setInterval(moveBar, 20);

/* START PVP */
function startPvP() {
  state.mode = "pvp";
  state.pool = 0;
  state.p1Paid = false;
  state.p2Paid = false;
  state.scoreP1 = 0;
  state.scoreP2 = 0;
  state.rounds = 0;
  alert("PvP Mode Started!");
  render();
}

/* ENTER */
function enterGame() {
  if (state.mode === "pvp") {

    if (!state.p1Paid) {
      if (state.coins >= state.entryFee) {
        state.coins -= state.entryFee;
        state.pool += state.entryFee;
        state.p1Paid = true;
        alert("Player 1 joined");
      } else return alert("Not enough ION");
    }
    else if (!state.p2Paid) {
      if (state.coins >= state.entryFee) {
        state.coins -= state.entryFee;
        state.pool += state.entryFee;
        state.p2Paid = true;
        alert("Player 2 joined");
      } else return alert("Not enough ION");
    }

    if (state.p1Paid && state.p2Paid) {
      alert("Match Started ⚔️");
    }

  } else {
    if (state.coins >= state.entryFee) {
      state.coins -= state.entryFee;
    }
  }

  updateBalance();
}

/* HIT */
function hit() {
  let perfectStart = 120;
  let perfectEnd = 180;

  let success = state.pos > perfectStart && state.pos < perfectEnd;

  let points = 0;

  if (success) {
    state.combo++;
    state.multiplier = 1 + Math.floor(state.combo / 3);
    points = 10 * state.multiplier;
  } else {
    state.combo = 0;
    state.multiplier = 1;
  }

  if (state.mode === "pvp") {

    if (state.currentPlayer === "P1") {
      state.scoreP1 += points;
      state.currentPlayer = "P2";
    } else {
      state.scoreP2 += points;
      state.currentPlayer = "P1";
    }

    state.rounds++;

    if (state.rounds >= 10) endPvP();

  } else {
    state.score += points;
  }

  state.pos = 0;
  render();
}

/* END PvP */
function endPvP() {
  let winner = "";

  if (state.scoreP1 > state.scoreP2) winner = "Player 1";
  else if (state.scoreP2 > state.scoreP1) winner = "Player 2";
  else {
    alert("Draw! Pool refunded");
    state.coins += state.pool;
    state.pool = 0;
    return;
  }

  alert(winner + " wins " + state.pool + " ION!");
  state.coins += state.pool;

  state.pool = 0;
  state.mode = "solo";
}

/* PROFILE */
function profilePage() {
  return `
    <h2>Profile</h2>
    <p>Coins: ${state.coins}</p>
  `;
}

/* RENDER */
function render() {
  let html = "";

  if (state.page === "home") html = homePage();
  if (state.page === "game") html = gamePage();
  if (state.page === "profile") html = profilePage();

  document.getElementById("content").innerHTML = html;
}

/* BALANCE */
function updateBalance() {
  document.getElementById("balance").innerText = "💰 " + state.coins + " ION";
}

render();
</script></body>
</html>
