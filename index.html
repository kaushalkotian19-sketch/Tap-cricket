<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Hit Arena</title><style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

/* TOP BAR */
#topBar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #0b1a2e;
}

#menuBtn { font-size: 22px; cursor: pointer; }

#balance {
  background: #132b4a;
  padding: 6px 12px;
  border-radius: 20px;
}

/* OVERLAY */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
}

/* SIDE MENU */
#sideMenu {
  position: fixed;
  top: 0;
  left: -220px;
  width: 200px;
  height: 100%;
  background: #0f2238;
  padding: 20px;
  transition: 0.3s;
  z-index: 10;
}

#sideMenu button {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: #1e293b;
  color: white;
  border: none;
  border-radius: 8px;
}

/* GAME */
#gameBox {
  width: 300px;
  height: 40px;
  background: #1e293b;
  margin: 20px auto;
  position: relative;
  border-radius: 10px;
}

#perfect {
  position: absolute;
  height: 100%;
  background: #22c55e;
  left: 40%;
  width: 20%;
}

#hitZone {
  width: 10px;
  height: 100%;
  background: red;
  position: absolute;
  left: 0;
}

/* BUTTON */
button {
  padding: 12px;
  margin: 10px;
  background: #ef4444;
  border: none;
  border-radius: 10px;
  color: white;
}
</style></head><body><div id="topBar">
  <div id="menuBtn" onclick="toggleMenu()">☰</div>
  <div id="balance">💰 500 ION</div>
</div><div id="overlay" onclick="toggleMenu()"></div><div id="sideMenu">
  <h3>Menu</h3>
  <button onclick="goPage('home')">🏠 Dashboard</button>
  <button onclick="goPage('game')">🎮 Play</button>
  <button onclick="goPage('profile')">👤 Profile</button>
</div><div id="content"></div><!-- 🔊 BACKGROUND MUSIC --><audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9bce08.mp3">
</audio><script>
let state = {
  coins: 500,
  page: "home",
  menu: false,
  pos: 0,
  speed: 3,
  score: 0,
  turn: "Player 1"
};

/* MENU */
function toggleMenu() {
  state.menu = !state.menu;
  document.getElementById("sideMenu").style.left = state.menu ? "0" : "-220px";
  document.getElementById("overlay").style.display = state.menu ? "block" : "none";
}

/* NAVIGATION */
function goPage(p) {
  state.page = p;
  toggleMenu();
  render();
}

/* HOME */
function homePage() {
  return `<h1>🎯 Perfect Hit Arena</h1>`;
}

/* GAME */
function gamePage() {
  return `
    <h2>${state.turn}</h2>
    <h3>Score: ${state.score}</h3>

    <div id="gameBox">
      <div id="perfect"></div>
      <div id="hitZone"></div>
    </div>

    <button onclick="enterGame()">Enter (100 ION)</button>
    <button onclick="hit()">HIT</button>
  `;
}

/* MOVE BAR */
function moveBar() {
  if (state.page !== "game") return;

  let bar = document.getElementById("hitZone");
  if (!bar) return;

  state.pos += state.speed;

  if (state.pos > 290 || state.pos < 0) {
    state.speed *= -1;
  }

  bar.style.left = state.pos + "px";
}
setInterval(moveBar, 20);

/* GAME LOGIC */
function enterGame() {
  if (state.coins >= 100) {
    state.coins -= 100;
    state.score = 0;
    updateBalance();

    // 🔊 start music
    document.getElementById("bgMusic").play();
  } else {
    alert("Not enough ION");
  }
}

function hit() {
  let perfectStart = 120;
  let perfectEnd = 180;

  if (state.pos > perfectStart && state.pos < perfectEnd) {
    state.score += 10;
    state.coins += 20;
    alert("Perfect Hit!");
  } else {
    alert("Miss!");
  }

  state.pos = 0;

  // 🔁 SWITCH PLAYER
  state.turn = state.turn === "Player 1" ? "Player 2" : "Player 1";

  updateBalance();
  render();
}

/* PROFILE */
function profilePage() {
  return `
    <h2>Profile</h2>
    <p>Coins: ${state.coins}</p>
    <p>Score: ${state.score}</p>
  `;
}

/* RENDER */
function render() {
  let html = "";

  if (state.page === "home") html = homePage();
  if (state.page === "game") html = gamePage();
  if (state.page === "profile") html = profilePage();

  document.getElementById("content").innerHTML = html;
}

/* UPDATE BALANCE */
function updateBalance() {
  document.getElementById("balance").innerText = "💰 " + state.coins + " ION";
}

/* INIT */
render();
</script></body>
</html>
