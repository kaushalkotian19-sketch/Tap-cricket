<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Hit Arena</title>

<style>
body {
  margin:0;
  font-family:Arial;
  text-align:center;
  background:#0f172a;
  color:white;
}

h1 { margin-top:15px; }

#gameBox {
  width:300px;
  height:40px;
  background:#1e293b;
  margin:20px auto;
  position:relative;
  border-radius:10px;
}

.zone { position:absolute; height:100%; }

#perfect { background:#22c55e; }
#good { background:#eab308; opacity:0.5; }

#marker {
  width:10px;
  height:100%;
  background:#ef4444;
  position:absolute;
}

button {
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#ef4444;
  color:white;
}
</style>
</head>

<body>

<h1>🎯 Perfect Hit Arena</h1>

<div>💰 Balance: <span id="balance">500</span> ION</div>
<div>🏟 Arena: <span id="arenaText">1</span></div>
<div>👑 Title: <span id="titleText">Beginner</span></div>
<div>👤 Turn: <span id="playerTurn">Player 1</span></div>
<div>Score: <span id="score">0</span></div>
<div>Time: <span id="timer">10</span>s</div>

<div id="gameBox">
  <div id="good" class="zone"></div>
  <div id="perfect" class="zone"></div>
  <div id="marker"></div>
</div>

<button onclick="startGame()">Enter (100 ION)</button>
<button onclick="hit()">HIT</button>

<div id="result"></div>

<!-- SOUND -->
<audio id="bgm" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
<audio id="hitSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>
<audio id="missSound" src="https://www.soundjay.com/button/beep-10.wav"></audio>

<script>
let marker = document.getElementById("marker");
let perfect = document.getElementById("perfect");
let good = document.getElementById("good");

let score = 0;
let timeLeft = 10;
let speed = 4;
let pos = 0;
let direction = 1;
let gameActive = false;

let zonePos = 120;
let balance = 500;

let player = 1;
let p1Score = 0;
let p2Score = 0;

// ARENA SYSTEM
let arena = parseInt(localStorage.getItem("arena") || 1);
document.getElementById("arenaText").innerText = arena;

// TITLE SYSTEM
function getTitle(score){
  if(score >= 250) return "🏆 Legend";
  if(score >= 150) return "🔥 Perfect King";
  if(score >= 80) return "🎯 Sharpshooter";
  return "Beginner";
}

// START GAME
function startGame(){
  if(balance < 100){
    alert("Not enough ION!");
    return;
  }

  balance -= 100;
  document.getElementById("balance").innerText = balance;

  score = 0;
  timeLeft = 10;
  gameActive = true;

  // difficulty
  if(arena === 1){
    speed = 4;
    perfect.style.width = "60px";
  }
  if(arena === 2){
    speed = 6;
    perfect.style.width = "50px";
  }
  if(arena === 3){
    speed = 8;
    perfect.style.width = "40px";
  }

  good.style.width = "120px";

  document.getElementById("bgm").play();

  animate();
  startTimer();
}

// ANIMATION
function animate(){
  if(!gameActive) return;

  pos += speed * direction;

  if(pos >= 290 || pos <= 0){
    direction *= -1;
  }

  marker.style.left = pos + "px";

  zonePos += 1;
  if(zonePos > 200) zonePos = 80;

  perfect.style.left = zonePos + "px";
  good.style.left = (zonePos - 30) + "px";

  requestAnimationFrame(animate);
}

// HIT
function hit(){
  if(!gameActive) return;

  if(pos >= zonePos && pos <= zonePos + parseInt(perfect.style.width)){
    score += 10;
    speed += 0.2;
    document.getElementById("hitSound").play();
  }
  else if(pos >= zonePos-30 && pos <= zonePos+90){
    score += 5;
    document.getElementById("hitSound").play();
  }
  else{
    document.getElementById("missSound").play();
  }

  document.getElementById("score").innerText = score;
}

// TIMER
function startTimer(){
  let t = setInterval(()=>{
    if(!gameActive){
      clearInterval(t);
      return;
    }

    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if(timeLeft <= 0){
      clearInterval(t);
      endTurn();
    }

  },1000);
}

// TURN SYSTEM
function endTurn(){
  gameActive = false;

  if(player === 1){
    p1Score = score;
    player = 2;
    document.getElementById("playerTurn").innerText = "Player 2";
    alert("Player 2 Turn!");
  } else {
    p2Score = score;
    decideWinner();
  }
}

// WINNER + UNLOCK
function decideWinner(){
  let winnerScore = Math.max(p1Score, p2Score);

  let title = getTitle(winnerScore);
  document.getElementById("titleText").innerText = title;

  // unlock arenas
  if(winnerScore >= 100 && arena < 2){
    arena = 2;
    localStorage.setItem("arena", 2);
    alert("🔥 Arena 2 Unlocked!");
  }

  if(winnerScore >= 200 && arena < 3){
    arena = 3;
    localStorage.setItem("arena", 3);
    alert("🔥 Arena 3 Unlocked!");
  }

  document.getElementById("arenaText").innerText = arena;

  let winner = "";

  if(p1Score > p2Score){
    winner = "Player 1";
    balance += 200;
  } else if(p2Score > p1Score){
    winner = "Player 2";
    balance += 200;
  } else {
    winner = "Draw";
    balance += 100;
  }

  document.getElementById("balance").innerText = balance;
  document.getElementById("result").innerText = "🏆 Winner: " + winner;

  document.getElementById("bgm").pause();
}
</script>

</body>
</html>
