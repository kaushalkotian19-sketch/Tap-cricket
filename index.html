<!DOCTYPE html>
<html>
<head>
  <title>Tap Cricket Pro v4</title>
</head>

<body style="background:#0b1a2f; color:white; text-align:center; font-family:sans-serif; overflow:hidden;">

<h1>🏏 Tap Cricket Pro</h1>

<h2 id="score">Score: 0</h2>
<h3 id="balls">Balls left: 6</h3>
<h3 id="result"></h3>

<div style="position:relative; height:400px; margin-top:20px;">

  <!-- Ball -->
  <div id="ball" style="
    position:absolute;
    width:18px;
    height:18px;
    background:red;
    border-radius:50%;
    top:0px;
    left:50%;
  "></div>

  <!-- Player -->
  <div style="
    position:absolute;
    bottom:40px;
    left:48%;
    width:10px;
    height:40px;
    background:white;
  "></div>

  <!-- Bat -->
  <div id="bat" style="
    position:absolute;
    bottom:40px;
    left:48%;
    width:60px;
    height:6px;
    background:orange;
    transform-origin:left;
  "></div>

  <!-- Power meter -->
  <div style="
    position:absolute;
    bottom:10px;
    left:20%;
    width:60%;
    height:10px;
    background:#222;
  ">
    <div id="power" style="
      width:10%;
      height:100%;
      background:yellow;
    "></div>
  </div>

</div>

<button onclick="hit()" style="padding:15px; font-size:18px;">HIT</button>

<audio id="hitSound" src="https://www.soundjay.com/button/button-3.mp3"></audio>
<audio id="missSound" src="https://www.soundjay.com/button/button-10.mp3"></audio>

<script>
let score = 0;
let balls = 6;
let ballY = 0;
let ballX = 50;
let speed = 3;
let interval;
let power = 10;
let powerDir = 1;

// Power meter animation
setInterval(() => {
  power += powerDir * 2;
  if (power > 100 || power < 10) powerDir *= -1;
  document.getElementById("power").style.width = power + "%";
}, 40);

// Start ball
function startBall() {
  ballY = 0;
  ballX = 40 + Math.random() * 20;
  speed = 3 + Math.random() * 2;

  let ball = document.getElementById("ball");
  ball.style.top = "0px";
  ball.style.left = ballX + "%";

  interval = setInterval(() => {
    ballY += speed;
    ball.style.top = ballY + "px";

    if (ballY > 300) {
      clearInterval(interval);
      out();
    }
  }, 20);
}

function hit() {
  if (balls <= 0) return;

  clearInterval(interval);

  let bat = document.getElementById("bat");
  bat.style.transform = "rotate(-60deg)";
  setTimeout(() => {
    bat.style.transform = "rotate(0deg)";
  }, 200);

  let run = 0;
  let text = "";

  // Timing + power logic
  if (ballY > 230 && ballY < 300) {
    if (power > 80) {
      run = 6;
      text = "🔥 SIX!";
      flash();
    } else if (power > 50) {
      run = 4;
      text = "👍 FOUR!";
    } else {
      run = 1;
      text = "🙂 Single";
    }

    // Ball goes up animation
    let ball = document.getElementById("ball");
    let up = 300;
    let anim = setInterval(() => {
      up -= 10;
      ball.style.top = up + "px";
      if (up < 50) clearInterval(anim);
    }, 20);

    document.getElementById("hitSound").play();

  } else {
    return out();
  }

  score += run;
  balls--;

  update(text);

  if (balls > 0) {
    setTimeout(startBall, 800);
  } else {
    endGame();
  }
}

function out() {
  balls--;
  update("❌ OUT!");
  document.getElementById("missSound").play();

  if (balls > 0) {
    setTimeout(startBall, 800);
  } else {
    endGame();
  }
}

function flash() {
  document.body.style.background = "#333";
  setTimeout(() => {
    document.body.style.background = "#0b1a2f";
  }, 100);
}

function update(text) {
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("balls").innerText = "Balls left: " + balls;
  document.getElementById("result").innerText = text;
}

function endGame() {
  setTimeout(() => {
    alert("🏏 Game Over!\nScore: " + score);
  }, 200);
}

startBall();
</script>

</body>
</html>
