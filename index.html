<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Hit</title>

<style>
body {
  margin:0;
  font-family:Arial;
  text-align:center;
  background:#0f172a;
  color:white;
}

h1 { margin-top:20px; }

#score, #timer, #highscore {
  font-size:18px;
  margin:5px;
}

#gameBox {
  width:300px;
  height:40px;
  background:#1e293b;
  margin:30px auto;
  position:relative;
  border-radius:10px;
}

.zone {
  position:absolute;
  height:100%;
}

#perfect {
  background:#22c55e;
  width:60px;
}

#good {
  background:#eab308;
  width:120px;
  opacity:0.5;
}

#marker {
  width:10px;
  height:100%;
  background:#ef4444;
  position:absolute;
  left:0;
}

button {
  padding:10px 20px;
  font-size:16px;
  background:#ef4444;
  border:none;
  border-radius:8px;
  color:white;
  margin:5px;
}

#result {
  margin-top:15px;
  font-size:18px;
}

#leaderboard {
  margin-top:20px;
}
</style>
</head>

<body>

<h1>🎯 Perfect Hit</h1>

<div id="score">Score: 0</div>
<div id="timer">Time: 10s</div>

<div id="gameBox">
  <div id="good" class="zone"></div>
  <div id="perfect" class="zone"></div>
  <div id="marker"></div>
</div>

<button onclick="hit()">HIT</button>
<button onclick="restartGame()">Restart</button>

<div id="result">Tap at the right time!</div>

<div id="leaderboard">
<h3>🏆 Top Scores</h3>
<div id="scores"></div>
</div>

<script>
let marker = document.getElementById("marker");
let perfect = document.getElementById("perfect");
let good = document.getElementById("good");

let score = 0;
let combo = 0;
let timeLeft = 10;

let speed = 4;
let pos = 0;
let direction = 1;
let gameActive = true;

let zonePos = 120;

// leaderboard
let scores = JSON.parse(localStorage.getItem("scores")) || [];

function updateLeaderboard(){
  let html = "";
  scores.sort((a,b)=>b-a).slice(0,5).forEach(s=>{
    html += "<div>" + s + "</div>";
  });
  document.getElementById("scores").innerHTML = html;
}

updateLeaderboard();

// sound
function playSound(freq){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  osc.frequency.value = freq;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),100);
}

// animate marker + difficulty
function animate(){
  if(!gameActive) return;

  pos += speed * direction;

  if(pos >= 290 || pos <= 0){
    direction *= -1;
  }

  marker.style.left = pos + "px";

  // move zones slowly
  zonePos += 1;
  if(zonePos > 200) zonePos = 80;

  perfect.style.left = zonePos + "px";
  good.style.left = (zonePos - 30) + "px";

  requestAnimationFrame(animate);
}

// hit logic
function hit(){
  if(!gameActive) return;

  let resultText = "";

  if(pos >= zonePos && pos <= zonePos+60){
    combo++;
    score += 10 + combo;
    resultText = "🔥 PERFECT x" + combo;
    playSound(600);
    speed += 0.2;
  }
  else if(pos >= zonePos-30 && pos <= zonePos+90){
    combo = 0;
    score += 5;
    resultText = "👍 GOOD!";
    playSound(400);
  }
  else{
    combo = 0;
    resultText = "❌ MISS!";
    playSound(200);
  }

  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("result").innerText = resultText;
}

// timer
function startTimer(){
  let timer = setInterval(() => {

    if(!gameActive){
      clearInterval(timer);
      return;
    }

    timeLeft--;
    document.getElementById("timer").innerText = "Time: " + timeLeft + "s";

    if(timeLeft <= 0){
      gameActive = false;
      clearInterval(timer);

      scores.push(score);
      localStorage.setItem("scores", JSON.stringify(scores));
      updateLeaderboard();

      document.getElementById("result").innerText = "🏁 GAME OVER!";
      alert("Final Score: " + score);
    }

  }, 1000);
}

// restart
function restartGame(){
  score = 0;
  combo = 0;
  timeLeft = 10;
  speed = 4;
  gameActive = true;

  document.getElementById("score").innerText = "Score: 0";
  document.getElementById("timer").innerText = "Time: 10s";
  document.getElementById("result").innerText = "Tap at the right time!";

  animate();
  startTimer();
}

animate();
startTimer();
</script>

</body>
</html>
