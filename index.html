<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Hit Arena</title><!-- Firebase --><script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script><style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#0f172a,#020617);
  color: white;
  text-align: center;
}

/* TOP BAR */
#topBar {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  background: #0b1a2e;
}

#balance {
  background: #132b4a;
  padding: 6px 14px;
  border-radius: 20px;
}

/* GAME */
#gameBox {
  width: 300px;
  height: 40px;
  background: #1e293b;
  margin: 20px auto;
  position: relative;
  border-radius: 10px;
}

#perfect {
  position: absolute;
  height: 100%;
  background: #22c55e;
  left: 40%;
  width: 20%;
}

#hitZone {
  width: 10px;
  height: 100%;
  background: red;
  position: absolute;
  left: 0;
}

/* BUTTONS */
button {
  padding: 12px 18px;
  margin: 10px;
  background: linear-gradient(#ff4d4d,#b91c1c);
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 16px;
}

/* ROOM CARD */
.room {
  background: #1e293b;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}
</style></head><body><div id="topBar">
  <div>⚔️ Perfect Hit Arena</div>
  <div id="balance">💰 500 ION</div>
</div><div id="content"></div><script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDVnSw1QHjrZ0TCHOKBDK5PxjMhPPRVehI",
  authDomain: "perfect-hit-arena.firebaseapp.com",
  databaseURL: "https://perfect-hit-arena-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "perfect-hit-arena",
  storageBucket: "perfect-hit-arena.firebasestorage.app",
  messagingSenderId: "1098567967142",
  appId: "1:1098567967142:web:1a6b3bbd3a97cea6566f67"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// STATE
let balance = 500;
let score = 0;
let combo = 0;
let multiplier = 1;

let playerId = "p" + Math.floor(Math.random()*10000);
let roomId = null;
let entryFee = 100;

let pos = 0;
let speed = 3;

// LOBBY
function renderLobby() {
  db.ref("rooms").once("value", snap => {
    let rooms = snap.val() || {};

    let html = "<h2>⚔️ Combat Rooms</h2>";

    for (let id in rooms) {
      html += `
        <div class="room">
          <p>Room: ${id}</p>
          <p>Pool: ${rooms[id].pool} ION</p>
          <button onclick="joinRoom('${id}')">Join</button>
        </div>
      `;
    }

    html += `<button onclick="createRoom()">+ Create Room</button>`;

    document.getElementById("content").innerHTML = html;
  });
}

// CREATE ROOM
function createRoom() {
  if (balance < entryFee) return alert("Not enough ION");

  let id = "room_" + Math.floor(Math.random()*10000);

  db.ref("rooms/" + id).set({
    pool: entryFee,
    players: {
      [playerId]: { score: 0 }
    }
  });

  balance -= entryFee;
  updateBalance();

  roomId = id;
  renderGame();
  listenRoom();
}

// JOIN ROOM
function joinRoom(id) {
  db.ref("rooms/" + id).once("value", snap => {
    if (!snap.exists()) return alert("Invalid Room");

    let room = snap.val();

    if (balance < entryFee) return alert("Not enough ION");

    db.ref("rooms/" + id + "/players/" + playerId).set({
      score: 0
    });

    db.ref("rooms/" + id + "/pool").set(room.pool + entryFee);

    balance -= entryFee;
    updateBalance();

    roomId = id;
    renderGame();
    listenRoom();
  });
}

// GAME UI
function renderGame() {
  document.getElementById("content").innerHTML = `
    <h2>Score: ${score}</h2>
    <h3 style="color:#22c55e;">Combo: ${combo} (x${multiplier})</h3>

    <div id="gameBox">
      <div id="perfect"></div>
      <div id="hitZone"></div>
    </div>

    <button onclick="hit()">🎯 HIT</button>
  `;
}

// HIT SYSTEM
function hit() {
  let success = pos > 120 && pos < 180;

  if (success) {
    combo++;
    multiplier = Math.floor(combo / 3) + 1;
    score += 10 * multiplier;
  } else {
    combo = 0;
    multiplier = 1;
  }

  updateScore();
  renderGame();
}

// UPDATE SCORE TO FIREBASE
function updateScore() {
  if (roomId) {
    db.ref("rooms/" + roomId + "/players/" + playerId)
      .update({ score: score });
  }
}

// LISTEN ROOM
function listenRoom() {
  db.ref("rooms/" + roomId).on("value", snap => {
    let data = snap.val();
    if (!data) return;

    let scores = Object.values(data.players).map(p => p.score);
    let max = Math.max(...scores);

    if (max >= 200) {
      if (score === max) {
        alert("🏆 You won " + data.pool + " ION!");
        balance += data.pool;
        updateBalance();
      } else {
        alert("❌ You lost!");
      }

      db.ref("rooms/" + roomId).remove();
      roomId = null;
      score = 0;
      combo = 0;

      renderLobby();
    }
  });
}

// BALANCE UPDATE
function updateBalance() {
  document.getElementById("balance").innerText = "💰 " + balance + " ION";
}

// BAR MOVEMENT
setInterval(() => {
  let bar = document.getElementById("hitZone");
  if (!bar) return;

  pos += speed;

  if (pos > 290 || pos < 0) speed *= -1;

  bar.style.left = pos + "px";
}, 20);

// START
renderLobby();
</script></body>
</html>
