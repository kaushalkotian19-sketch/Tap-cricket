<!DOCTYPE html>
<html>
<head>
  <title>Tap Cricket V5</title>
</head>

<body style="background:#0b1a2f; color:white; text-align:center; font-family:sans-serif;">

<h1>🏏 Tap Cricket Match</h1>

<h3>Select Overs</h3>
<button onclick="startMatch(2)">2 Overs</button>
<button onclick="startMatch(5)">5 Overs</button>
<button onclick="startMatch(10)">10 Overs</button>
<button onclick="startMatch(20)">20 Overs</button>

<h2 id="info"></h2>
<h2 id="score"></h2>
<h3 id="status"></h3>

<button onclick="playShot()" id="hitBtn" style="display:none; padding:15px; font-size:18px;">HIT</button>

<script>
let totalBalls = 0;
let ballsLeft = 0;
let wickets = 0;
let score = 0;
let target = 0;
let innings = 1;

function startMatch(overs) {
  totalBalls = overs * 6;
  ballsLeft = totalBalls;
  wickets = 0;
  score = 0;
  innings = 1;

  document.getElementById("hitBtn").style.display = "inline";
  updateDisplay("Batting - Set your target");
}

function playShot() {
  if (ballsLeft <= 0 || wickets >= 3) return nextInnings();

  let outcome = Math.random();

  if (outcome < 0.15) {
    wickets++;
    updateDisplay("❌ OUT!");
  } else {
    let runs = [1,2,4,6][Math.floor(Math.random()*4)];
    score += runs;
    updateDisplay("Scored " + runs);
  }

  ballsLeft--;

  if (ballsLeft === 0 || wickets >= 3) {
    nextInnings();
  }
}

function nextInnings() {
  if (innings === 1) {
    target = score + 1;
    innings = 2;

    ballsLeft = totalBalls;
    wickets = 0;
    score = 0;

    document.getElementById("hitBtn").style.display = "none";

    document.getElementById("info").innerText = "AI chasing: Target " + target;

    setTimeout(aiPlay, 1000);
  } else {
    endMatch();
  }
}

function aiPlay() {
  let aiScore = 0;
  let aiWickets = 0;
  let balls = totalBalls;

  let interval = setInterval(() => {
    if (balls <= 0 || aiWickets >= 3 || aiScore >= target) {
      clearInterval(interval);
      showResult(aiScore);
      return;
    }

    let outcome = Math.random();

    if (outcome < 0.2) {
      aiWickets++;
    } else {
      let runs = [1,2,4,6][Math.floor(Math.random()*4)];
      aiScore += runs;
    }

    balls--;

    document.getElementById("status").innerText =
      "AI Score: " + aiScore + " | Wickets: " + aiWickets;

  }, 500);
}

function showResult(aiScore) {
  if (aiScore >= target) {
    alert("😢 You Lost! AI scored " + aiScore);
  } else {
    alert("🎉 You Won! AI scored " + aiScore);
  }
}

function updateDisplay(msg) {
  document.getElementById("info").innerText =
    "Balls left: " + ballsLeft + " | Wickets: " + wickets;

  document.getElementById("score").innerText =
    "Score: " + score;

  document.getElementById("status").innerText = msg;
}
</script>

</body>
</html>
