<!DOCTYPE html>
<html>
<head>
  <title>Tap Cricket V6</title>
</head>

<body style="background:#0b1a2f; color:white; text-align:center; font-family:sans-serif;">

<h1>🏏 Tap Cricket V6</h1>

<h2 id="score">Score: 0</h2>
<h3 id="balls">Balls: 6</h3>
<h3 id="result"></h3>

<div style="position:relative; height:400px; overflow:hidden;">

  <!-- Ball -->
  <div id="ball" style="
    position:absolute;
    width:18px;
    height:18px;
    background:red;
    border-radius:50%;
    top:0;
    left:50%;
  "></div>

  <!-- Bat -->
  <div id="bat" style="
    position:absolute;
    bottom:40px;
    left:45%;
    width:70px;
    height:8px;
    background:orange;
    transform-origin:left;
  "></div>

</div>

<button onclick="hit()" style="padding:15px; font-size:18px;">HIT</button>

<script>
let score = 0;
let balls = 6;
let ballY = 0;
let speed = 4;
let interval;

function startBall() {
  ballY = 0;
  speed = 3 + Math.random()*3;

  let ball = document.getElementById("ball");
  ball.style.top = "0px";

  interval = setInterval(() => {
    ballY += speed;
    ball.style.top = ballY + "px";

    if (ballY > 320) {
      clearInterval(interval);
      out();
    }
  }, 20);
}

function hit() {
  if (balls <= 0) return;

  clearInterval(interval);

  // Bat animation
  let bat = document.getElementById("bat");
  bat.style.transform = "rotate(-60deg)";
  setTimeout(() => {
    bat.style.transform = "rotate(0deg)";
  }, 200);

  let run = 0;
  let text = "";

  // TIMING ZONES
  if (ballY > 260 && ballY < 320) {
    run = 6;
    text = "🔥 SIX!";
    flyBall();
  }
  else if (ballY > 220 && ballY <= 260) {
    run = 4;
    text = "👍 FOUR!";
    flyBall();
  }
  else if (ballY > 180 && ballY <= 220) {
    run = 1;
    text = "🙂 SINGLE";
  }
  else {
    return out();
  }

  score += run;
  balls--;

  update(text);

  if (balls > 0) {
    setTimeout(startBall, 700);
  } else {
    endGame();
  }
}

function flyBall() {
  let ball = document.getElementById("ball");
  let up = ballY;

  let anim = setInterval(() => {
    up -= 10;
    ball.style.top = up + "px";

    if (up < 50) clearInterval(anim);
  }, 20);
}

function out() {
  balls--;
  update("❌ OUT!");

  if (balls > 0) {
    setTimeout(startBall, 700);
  } else {
    endGame();
  }
}

function update(text) {
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("balls").innerText = "Balls: " + balls;
  document.getElementById("result").innerText = text;
}

function endGame() {
  setTimeout(() => {
    alert("🏏 Game Over!\nScore: " + score);
  }, 200);
}

// start game
startBall();
</script>

</body>
</html>
