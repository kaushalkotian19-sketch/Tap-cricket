<!DOCTYPE html>
<html>
<head>
  <title>Tap Cricket Pro</title>
</head>

<body style="background:#0b1a2f; color:white; text-align:center;">

<h1>🏏 Tap Cricket Pro</h1>

<h2 id="score">Score: 0</h2>
<h3 id="balls">Balls left: 6</h3>
<h3 id="result"></h3>

<button onclick="hit()" style="padding:20px; font-size:20px;">HIT</button>

<script>
let score = 0;
let balls = 6;
let pos = 150; // example

function hit() {
  if (balls <= 0) return;

  let ballPos = pos;
  let targetStart = 120;
  let targetEnd = 180;

  let run = 0;
  let text = "";

  if (ballPos >= targetStart && ballPos <= targetEnd) {
    run = 6;
    text = "🔥 SIX!";
  } else if (ballPos >= 90 && ballPos <= 210) {
    run = 2;
    text = "👍 Good Shot!";
  } else {
    run = 0;
    text = "❌ Miss!";
  }

  score += run;
  balls--;

  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("balls").innerText = "Balls left: " + balls;
  document.getElementById("result").innerText = text;

  if (balls === 0) {
    setTimeout(() => {
      alert("🏏 Game Over!\nScore: " + score);
    }, 200);
  }
}
</script>

</body>
</html>
