<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Cricket V13</title>

<style>
body {
  margin: 0;
  background: #0b3d2e;
  font-family: Arial;
  color: white;
  text-align: center;
}

#ui {
  background: #111;
  padding: 10px;
  font-size: 14px;
}

canvas {
  display: block;
  margin: auto;
  background: #2e7d32;
}

button {
  margin: 10px;
  padding: 12px 25px;
  font-size: 16px;
}
</style>
</head>

<body>

<div id="ui">
  🏏 Tap Cricket V13 | Score: <span id="score">0</span>
  | Result: <span id="result">-</span>
</div>

<canvas id="game" width="360" height="520"></canvas>

<button onclick="hit(-1)">⬅ Shot</button>
<button onclick="hit(1)">Shot ➡</button>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let score = 0;

let ball = { x: 180, y: 60, vx: 0, vy: 4, hit: false };

// LOAD IMAGES
let batsman = new Image();
batsman.src = "https://i.imgur.com/3WbQZ6k.png";

let bowler = new Image();
bowler.src = "https://i.imgur.com/7yUVEWv.png";

function drawField() {
  // grass stripes
  for (let i = 0; i < 6; i++) {
    ctx.fillStyle = i % 2 ? "#2e7d32" : "#388e3c";
    ctx.fillRect(0, i * 100, 360, 100);
  }

  // pitch
  ctx.fillStyle = "#c2a679";
  ctx.fillRect(130, 0, 100, 520);

  // crease
  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(120, 420);
  ctx.lineTo(240, 420);
  ctx.stroke();

  // stumps
  ctx.fillStyle = "white";
  ctx.fillRect(170, 390, 5, 30);
  ctx.fillRect(180, 390, 5, 30);
  ctx.fillRect(190, 390, 5, 30);
}

function drawPlayers() {
  ctx.drawImage(bowler, 140, 20, 80, 80);
  ctx.drawImage(batsman, 140, 350, 80, 100);
}

function drawBall() {
  // shadow
  ctx.beginPath();
  ctx.arc(ball.x, 440, 8, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fill();

  // ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, 6, 0, Math.PI * 2);
  ctx.fillStyle = "red";
  ctx.fill();
}

function updateBall() {
  ball.y += ball.vy;
  ball.x += ball.vx;

  if (ball.y > 420 && !ball.hit) {
    setResult("Miss!");
    resetBall();
  }

  if (ball.hit) {
    ball.vy -= 0.3;
  }

  if (ball.y < 0) resetBall();
}

function hit(dir) {
  let timing = Math.abs(ball.y - 420);

  if (timing < 25) {
    ball.hit = true;
    ball.vx = dir * (3 + Math.random() * 2);
    ball.vy = -7;

    let run = timing < 10 ? 6 : 4;
    score += run;

    setResult(run === 6 ? "🔥 SIX!" : "💥 FOUR!");
  } else {
    setResult("❌ Miss!");
  }

  document.getElementById("score").innerText = score;
}

function setResult(text) {
  document.getElementById("result").innerText = text;
}

function resetBall() {
  ball = { x: 180, y: 60, vx: 0, vy: 4, hit: false };
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawField();
  drawPlayers();
  drawBall();
  updateBall();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
