<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Hit Arena</title><style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

/* TOP BAR */
#topBar {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  background: #0b1a2e;
}

#menuBtn { font-size: 24px; cursor: pointer; }

#balance {
  background: #132b4a;
  padding: 6px 14px;
  border-radius: 20px;
}

/* MENU */
#sideMenu {
  position: fixed;
  left: -220px;
  width: 200px;
  height: 100%;
  background: #0f2238;
  padding: 20px;
  transition: 0.3s;
}

#overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
}

.menuBtn {
  width: 100%;
  margin: 12px 0;
  padding: 12px;
  background: #1e293b;
  border-radius: 10px;
  color: white;
  border: none;
}

/* GAME */
#gameBox {
  width: 300px;
  height: 40px;
  background: #1e293b;
  margin: 20px auto;
  position: relative;
  border-radius: 10px;
}

#perfect {
  position: absolute;
  height: 100%;
  background: #22c55e;
  left: 40%;
  width: 20%;
}

#hitZone {
  width: 10px;
  height: 100%;
  background: red;
  position: absolute;
  left: 0;
}

/* BUTTON */
button {
  padding: 12px 18px;
  margin: 12px;
  background: linear-gradient(45deg,#ef4444,#dc2626);
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 16px;
}

/* SCORE */
.bigScore {
  font-size: 28px;
  margin: 10px;
}

.combo {
  font-size: 18px;
  color: #22c55e;
}
</style></head><body><div id="topBar">
  <div id="menuBtn" onclick="toggleMenu()">☰</div>
  <div id="balance">💰 500 ION</div>
</div><div id="overlay" onclick="toggleMenu()"></div><div id="sideMenu">
  <button class="menuBtn" onclick="goPage('home')">🏠 Dashboard</button>
  <button class="menuBtn" onclick="goPage('game')">🎮 Play</button>
  <button class="menuBtn" onclick="goPage('leaderboard')">🏆 Leaderboard</button>
  <button class="menuBtn" onclick="goPage('settings')">⚙️ Settings</button>
  <button class="menuBtn" onclick="goPage('profile')">👤 Profile</button>
</div><div id="content"></div><audio id="bgMusic" loop src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9bce08.mp3"></audio>
<audio id="hitSound" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c1e92f4a2f.mp3"></audio>

<script>
let state = {
  coins: 500,
  page: "home",
  pos: 0,
  speed: 3,
  score: 0,
  combo: 0,
  multiplier: 1,
  time: 30,
  timer: null,
  leaderboard: [],
  sound: true,
  difficulty: "normal",
  title: "Beginner"
};

/* MENU */
function toggleMenu() {
  let menu = document.getElementById("sideMenu");
  let overlay = document.getElementById("overlay");

  if (menu.style.left === "0px") {
    menu.style.left = "-220px";
    overlay.style.display = "none";
  } else {
    menu.style.left = "0";
    overlay.style.display = "block";
  }
}

function goPage(p) {
  state.page = p;
  toggleMenu();
  render();
}

/* HOME */
function homePage() {
  return `<h1>🎯 Perfect Hit Arena</h1>
  <p>Welcome Player</p>`;
}

/* GAME */
function gamePage() {
  return `
    <div class="bigScore">Score: ${state.score}</div>
    <div class="combo">Combo: ${state.combo} (x${state.multiplier})</div>
    <div>⏱️ ${state.time}s</div>

    <div id="gameBox">
      <div id="perfect"></div>
      <div id="hitZone"></div>
    </div>

    <button onclick="startTimeAttack()">⏱️ Time Attack</button>
    <button onclick="hit()">🎯 HIT</button>
  `;
}

/* MOVE */
function moveBar() {
  if (state.page !== "game") return;
  let bar = document.getElementById("hitZone");
  if (!bar) return;

  state.pos += state.speed;
  if (state.pos > 290 || state.pos < 0) state.speed *= -1;

  bar.style.left = state.pos + "px";
}
setInterval(moveBar, 20);

/* TIME ATTACK */
function startTimeAttack() {
  state.score = 0;
  state.time = 30;

  if (state.timer) clearInterval(state.timer);

  state.timer = setInterval(() => {
    state.time--;
    if (state.time <= 0) {
      clearInterval(state.timer);
      endGame();
    }
    render();
  }, 1000);

  if (state.sound) document.getElementById("bgMusic").play();
}

/* HIT */
function hit() {
  let perfectStart = 120;
  let perfectEnd = 180;

  if (state.sound) document.getElementById("hitSound").play();

  let success = state.pos > perfectStart && state.pos < perfectEnd;

  if (success) {
    state.combo++;
    state.multiplier = 1 + Math.floor(state.combo / 3);
    state.score += 10 * state.multiplier;
  } else {
    state.combo = 0;
    state.multiplier = 1;
  }

  state.pos = 0;
  render();
}

/* END GAME */
function endGame() {
  alert("Time Up! Score: " + state.score);
  state.leaderboard.push(state.score);
  state.leaderboard.sort((a,b)=>b-a);
}

/* LEADERBOARD */
function leaderboardPage() {
  let list = state.leaderboard.slice(0,5).map(s=>`<p>🏆 ${s}</p>`).join("");
  return `<h2>Leaderboard</h2>${list}`;
}

/* SETTINGS */
function settingsPage() {
  return `
    <h2>Settings</h2>
    <button onclick="toggleSound()">Sound: ${state.sound ? "ON" : "OFF"}</button>
    <button onclick="setDifficulty('easy')">Easy</button>
    <button onclick="setDifficulty('hard')">Hard</button>
  `;
}

function toggleSound() {
  state.sound = !state.sound;
  render();
}

function setDifficulty(d) {
  state.difficulty = d;
  state.speed = d === "easy" ? 2 : 5;
  alert("Difficulty: " + d);
}

/* PROFILE */
function profilePage() {
  return `
    <h2>Profile</h2>
    <p>Title: ${state.title}</p>
    <p>Coins: ${state.coins}</p>
  `;
}

/* RENDER */
function render() {
  let html = "";
  if (state.page === "home") html = homePage();
  if (state.page === "game") html = gamePage();
  if (state.page === "leaderboard") html = leaderboardPage();
  if (state.page === "settings") html = settingsPage();
  if (state.page === "profile") html = profilePage();

  document.getElementById("content").innerHTML = html;
}

/* BALANCE */
function updateBalance() {
  document.getElementById("balance").innerText = "💰 " + state.coins + " ION";
}

render();
</script></body>
</html>
