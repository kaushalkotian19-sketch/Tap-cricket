<!DOCTYPE html>
<html>
<head>
  <title>Tap Cricket V7</title>
</head>

<body style="margin:0; text-align:center; font-family:sans-serif; background:#1e293b; color:white;">

<h2>🏏 Tap Cricket Match</h2>

<div id="menu">
  <h3>Select Overs</h3>
  <button onclick="startMatch(2)">2</button>
  <button onclick="startMatch(5)">5</button>
  <button onclick="startMatch(10)">10</button>
  <button onclick="startMatch(20)">20</button>
</div>

<h3 id="info"></h3>
<h2 id="score"></h2>
<h3 id="result"></h3>

<!-- Ground -->
<div style="position:relative; height:400px; background:green; overflow:hidden;">

  <!-- Pitch -->
  <div style="
    position:absolute;
    left:45%;
    width:10%;
    height:100%;
    background:#d2b48c;
  "></div>

  <!-- Ball -->
  <div id="ball" style="
    position:absolute;
    width:15px;
    height:15px;
    background:red;
    border-radius:50%;
    top:0;
    left:50%;
  "></div>

  <!-- Bat -->
  <div id="bat" style="
    position:absolute;
    bottom:40px;
    left:47%;
    width:60px;
    height:8px;
    background:orange;
    transform-origin:left;
  "></div>

</div>

<button onclick="hit()" id="hitBtn" style="padding:15px; font-size:18px; display:none;">
HIT
</button>

<script>
let score = 0;
let ballsLeft = 0;
let wickets = 0;
let totalBalls = 0;
let target = 0;
let innings = 1;

let ballY = 0;
let speed = 4;
let interval;

function startMatch(overs) {
  totalBalls = overs * 6;
  ballsLeft = totalBalls;
  wickets = 0;
  score = 0;
  innings = 1;

  document.getElementById("menu").style.display = "none";
  document.getElementById("hitBtn").style.display = "inline";

  updateInfo("Batting - Set target");
  startBall();
}

function startBall() {
  ballY = 0;
  speed = 3 + Math.random()*3;

  let ball = document.getElementById("ball");
  ball.style.top = "0px";

  interval = setInterval(() => {
    ballY += speed;
    ball.style.top = ballY + "px";

    if (ballY > 320) {
      clearInterval(interval);
      out();
    }
  }, 20);
}

function hit() {
  if (ballsLeft <= 0 || wickets >= 3) return;

  clearInterval(interval);

  let bat = document.getElementById("bat");
  bat.style.transform = "rotate(-60deg)";
  setTimeout(() => bat.style.transform = "rotate(0deg)", 200);

  let run = 0;
  let text = "";

  if (ballY > 260 && ballY < 320) {
    run = 6;
    text = "🔥 SIX!";
  } else if (ballY > 220) {
    run = 4;
    text = "👍 FOUR!";
  } else if (ballY > 180) {
    run = 1;
    text = "🙂 Single";
  } else {
    return out();
  }

  score += run;
  ballsLeft--;

  updateInfo(text);

  if (ballsLeft === 0 || wickets >= 3) {
    nextInnings();
  } else {
    setTimeout(startBall, 600);
  }
}

function out() {
  wickets++;
  ballsLeft--;

  updateInfo("❌ OUT!");

  if (ballsLeft === 0 || wickets >= 3) {
    nextInnings();
  } else {
    setTimeout(startBall, 600);
  }
}

function nextInnings() {
  if (innings === 1) {
    target = score + 1;
    innings = 2;

    ballsLeft = totalBalls;
    wickets = 0;
    score = 0;

    document.getElementById("hitBtn").style.display = "none";

    updateInfo("AI chasing: " + target);

    setTimeout(aiPlay, 1000);
  } else {
    endMatch();
  }
}

function aiPlay() {
  let aiScore = 0;
  let aiWickets = 0;
  let balls = totalBalls;

  let intervalAI = setInterval(() => {
    if (balls <= 0 || aiWickets >= 3 || aiScore >= target) {
      clearInterval(intervalAI);
      showResult(aiScore);
      return;
    }

    if (Math.random() < 0.2) {
      aiWickets++;
    } else {
      aiScore += [1,2,4,6][Math.floor(Math.random()*4)];
    }

    balls--;

    document.getElementById("result").innerText =
      "AI: " + aiScore + "/" + aiWickets;

  }, 500);
}

function showResult(aiScore) {
  if (aiScore >= target) {
    alert("😢 You Lost!");
  } else {
    alert("🎉 You Won!");
  }
}

function updateInfo(msg) {
  document.getElementById("info").innerText =
    "Balls: " + ballsLeft + " | Wickets: " + wickets;

  document.getElementById("score").innerText =
    "Score: " + score;

  document.getElementById("result").innerText = msg;
}
</script>

</body>
</html>
