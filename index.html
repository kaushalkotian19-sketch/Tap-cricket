<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Cricket V11</title>

<style>
body {
  margin: 0;
  text-align: center;
  background: #0a7d00;
  color: white;
  font-family: Arial;
}

canvas {
  background: linear-gradient(#6ec6ff, #0a7d00);
}
button {
  margin: 10px;
  padding: 12px 25px;
  font-size: 16px;
}
</style>
</head>

<body>

<h2>🏏 Tap Cricket V11</h2>
<div id="score">Score: 0</div>
<div id="result"></div>

<canvas id="game" width="350" height="500"></canvas><br>

<button onclick="hit(-1)">⬅ Off Side</button>
<button onclick="hit(1)">Leg Side ➡</button>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let ball = { x: 175, y: 50, vx: 0, vy: 4, hit: false };
let score = 0;

function drawGround() {
  // pitch
  ctx.fillStyle = "#8b4513";
  ctx.fillRect(140, 0, 70, 500);

  // stumps
  ctx.fillStyle = "white";
  ctx.fillRect(165, 420, 5, 30);
  ctx.fillRect(175, 420, 5, 30);
  ctx.fillRect(185, 420, 5, 30);
}

function drawPlayers() {
  // batsman
  ctx.fillStyle = "blue";
  ctx.fillRect(160, 400, 20, 40);

  // bat
  ctx.fillStyle = "yellow";
  ctx.fillRect(140, 420, 50, 5);

  // bowler
  ctx.fillStyle = "orange";
  ctx.fillRect(160, 20, 20, 40);
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, 6, 0, Math.PI * 2);
  ctx.fillStyle = "red";
  ctx.fill();
}

function updateBall() {
  ball.y += ball.vy;
  ball.x += ball.vx;

  // bounce / miss
  if (ball.y > 430 && !ball.hit) {
    document.getElementById("result").innerText = "Miss!";
    resetBall();
  }

  // after hit → ball goes up
  if (ball.hit) {
    ball.vy -= 0.3; // gravity effect
  }

  // reset if ball goes out
  if (ball.y < 0) {
    resetBall();
  }
}

function hit(direction) {
  let timing = Math.abs(ball.y - 420);

  if (timing < 25) {
    ball.hit = true;
    ball.vx = direction * (2 + Math.random() * 2);
    ball.vy = -6;

    score += timing < 10 ? 6 : 4;

    document.getElementById("score").innerText = "Score: " + score;
    document.getElementById("result").innerText = timing < 10 ? "🔥 SIX!" : "💥 FOUR!";
  } else {
    document.getElementById("result").innerText = "❌ Miss!";
  }
}

function resetBall() {
  ball = { x: 175, y: 50, vx: 0, vy: 4, hit: false };
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawGround();
  drawPlayers();
  drawBall();
  updateBall();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
